<!DOCTYPE html>
<html>

<head>
    <title>Projects</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #333;
            color: white;
            padding: 10px 20px;
            text-align: center;
        }

        section {
            padding: 20px;
        }

        h2 {
            color: #333;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>My Projects</h1>
        <p>Explore my mini projects</p>
    </header>

    <section>
        <h2>Projects</h2>
        <ul>
            <li><strong>Hello World</strong> - A simple "Hello, World!" project.</li>
        </ul>
    </section>

    <script>
        fetch('/projects.json')
            .then(response => response.json())
            .then(data => {
                const ul = document.querySelector('ul');
                data.projects.forEach(project => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${project.name}</strong> - ${project.description}`;
                    ul.appendChild(li);
                });
            });
    </script>
