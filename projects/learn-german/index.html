<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lern Deutsch — A1 Flashcards</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇩🇪</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        .app-header {
            width: 100%;
            max-width: 720px;
            padding: 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-title {
            color: white;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }


        .score-bar {
            display: flex;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
        }

        .score-pill {
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
        }

        .score-pill.right {
            background: rgba(16, 185, 129, 0.25);
            color: #6EE7B7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .score-pill.wrong {
            background: rgba(239, 68, 68, 0.22);
            color: #FCA5A5;
            border: 1px solid rgba(239, 68, 68, 0.35);
        }

        /* ── Tag Filter Strip ── */
        .tag-strip-wrapper {
            width: 100%;
            max-width: 720px;
            padding: 16px 20px 8px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.4) transparent;
        }
        .tag-strip-wrapper::-webkit-scrollbar {
            height: 4px;
        }
        .tag-strip-wrapper::-webkit-scrollbar-track {
            background: transparent;
        }
        .tag-strip-wrapper::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 999px;
        }
        .tag-strip-wrapper::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.65);
        }

        .tag-strip {
            display: flex;
            gap: 8px;
            width: max-content;
        }

        .tag-chip {
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.85);
            background: transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.18s, color 0.18s, border-color 0.18s;
        }

        .tag-chip:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: rgba(255, 255, 255, 0.6);
        }

        .tag-chip.active {
            background: white;
            color: #4F46E5;
            border-color: white;
        }

        /* ── Progress ── */
        .progress-row {
            width: 100%;
            max-width: 720px;
            padding: 14px 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.25);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: rgba(255,255,255,0.85);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        /* ── Card ── */
        .card-wrap {
            width: 100%;
            max-width: 720px;
            padding: 16px 20px 32px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 32px 28px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .english-word {
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 800;
            color: #1E1B4B;
            text-align: center;
            line-height: 1.25;
            min-height: 48px;
        }

        .divider {
            height: 1px;
            background: #E8E5FF;
        }

        .answer-input {
            width: 100%;
            padding: 13px 16px;
            font-size: 17px;
            border: 2px solid #C7D2FE;
            border-radius: 12px;
            color: #1E1B4B;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: inherit;
        }

        .answer-input::placeholder { color: #A5B4FC; }

        .answer-input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .answer-input.correct {
            border-color: #10B981;
            background: #ECFDF5;
            color: #065F46;
        }

        .answer-input.wrong {
            border-color: #EF4444;
            background: #FEF2F2;
            color: #991B1B;
        }

        .reveal-btn {
            width: 100%;
            padding: 15px;
            font-size: 17px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #6366F1 0%, #7C3AED 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .reveal-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }

        .reveal-btn:active { transform: translateY(0); }

        /* ── Answer Zone ── */
        .answer-zone {
            display: none;
            flex-direction: column;
            gap: 16px;
            animation: fadeSlideUp 0.28s ease;
        }

        .answer-zone.visible { display: flex; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .german-answer-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #8B5CF6;
        }

        .german-answer {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 800;
            color: #1E1B4B;
            line-height: 1.25;
        }

        .answer-tag-label {
            display: inline-block;
            margin-top: 8px;
            padding: 3px 10px;
            border-radius: 20px;
            background: #EDE9FE;
            color: #5B21B6;
            font-size: 12px;
            font-weight: 600;
        }

        .answer-explanation {
            margin-top: 10px;
            font-size: 13px;
            color: #6B7280;
            font-style: italic;
            line-height: 1.5;
        }

        .comparison-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #F5F3FF;
            border-radius: 12px;
            padding: 12px 14px;
        }

        .comparison-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 14px;
        }

        .comparison-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9CA3AF;
            min-width: 52px;
        }

        .comparison-text.match {
            color: #065F46;
            font-weight: 600;
        }

        .comparison-text.mismatch {
            color: #991B1B;
            font-weight: 600;
            text-decoration: line-through;
        }

        .match-badge {
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
        }

        .match-badge.correct { background: #D1FAE5; color: #065F46; }
        .match-badge.incorrect { background: #FEE2E2; color: #991B1B; }

        /* ── Self-score buttons ── */
        .self-score-label {
            font-size: 13px;
            font-weight: 600;
            color: #6B7280;
            text-align: center;
        }

        .self-score-btns {
            display: flex;
            gap: 10px;
        }

        .self-score-btns button {
            flex: 1;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .self-score-btns button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .btn-yes {
            background: #10B981;
            color: white;
        }

        .btn-no {
            background: #EF4444;
            color: white;
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #4F46E5;
            background: #EEF2FF;
            border: 2px solid #C7D2FE;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.18s, transform 0.15s;
        }

        .next-btn:hover {
            background: #E0E7FF;
            transform: translateY(-1px);
        }

        /* ── Completion Card ── */
        .completion-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 40px 28px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: fadeSlideUp 0.35s ease;
        }

        .completion-emoji { font-size: 52px; }

        .completion-title {
            font-size: 26px;
            font-weight: 800;
            color: #1E1B4B;
        }

        .completion-sub {
            font-size: 15px;
            color: #6B7280;
        }

        .completion-score {
            display: flex;
            gap: 16px;
        }

        .completion-score-pill {
            padding: 10px 22px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
        }

        .completion-score-pill.right { background: #D1FAE5; color: #065F46; }
        .completion-score-pill.wrong { background: #FEE2E2; color: #991B1B; }

        .completion-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-retry {
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #6366F1 0%, #7C3AED 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-retry:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }

        /* ── Loading / Error ── */
        .status-msg {
            color: rgba(255,255,255,0.8);
            text-align: center;
            padding: 40px 20px;
            font-size: 15px;
        }

        /* ── Toolbar (direction / audio controls) ── */
        .toolbar {
            width: 100%;
            max-width: 720px;
            padding: 14px 20px 0;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .dir-toggle,
        .auto-speak-toggle {
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.18s, color 0.18s, border-color 0.18s;
        }

        .dir-toggle,
        .auto-speak-toggle {
            color: rgba(255, 255, 255, 0.9);
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.35);
        }

        .dir-toggle:hover,
        .auto-speak-toggle:hover {
            background: rgba(255, 255, 255, 0.28);
            border-color: rgba(255, 255, 255, 0.6);
        }

        .dir-toggle[aria-pressed="true"],
        .auto-speak-toggle.on {
            background: white;
            color: #4F46E5;
            border-color: white;
        }

        /* ── F4: "almost" article state ── */
        .answer-input.almost {
            border-color: #F59E0B;
            background: #FFFBEB;
            color: #92400E;
        }

        .almost-hint {
            margin-top: 12px;
            padding: 10px 14px;
            border-radius: 12px;
            background: #FEF3C7;
            border: 1px solid #FDE68A;
            color: #92400E;
            font-size: 13px;
            font-weight: 600;
            line-height: 1.45;
        }

        .almost-hint .article-correct { font-weight: 800; color: #B45309; }
        .btn-almost-next { background: #F59E0B; color: white; }

        /* ── F7: speaker button ── */
        .german-answer-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speak-btn {
            flex: 0 0 auto;
            width: 40px;
            height: 40px;
            border-radius: 999px;
            border: 2px solid #C7D2FE;
            background: #EEF2FF;
            color: #4F46E5;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: background 0.18s, transform 0.15s, box-shadow 0.15s;
        }

        .speak-btn:hover { background: #E0E7FF; transform: translateY(-1px); }
        .speak-btn:active { transform: translateY(0); }

        /* ── F2: streak block ── */
        .streak-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            width: 100%;
            margin: 4px 0;
        }

        .streak-badge {
            font-size: 15px;
            font-weight: 800;
            color: #7C3AED;
            background: #F5F3FF;
            border: 1px solid #E8E5FF;
            padding: 8px 16px;
            border-radius: 999px;
            text-align: center;
        }

        .streak-badge.at-risk {
            color: #92400E;
            background: #FFFBEB;
            border-color: #FDE68A;
            font-size: 13px;
        }

        .streak-badge.none {
            color: #6B7280;
            background: #F3F4F6;
            border-color: #E5E7EB;
        }

        .streak-strip {
            display: flex;
            gap: 8px;
            align-items: flex-end;
            width: 100%;
            max-width: 280px;
        }

        .streak-day {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .streak-bar-track {
            width: 100%;
            height: 48px;
            background: #F3F4F6;
            border-radius: 8px;
            display: flex;
            align-items: flex-end;
            overflow: hidden;
        }

        .streak-bar-fill {
            width: 100%;
            border-radius: 8px;
            background: #E5E7EB;
            transition: height 0.4s ease;
        }

        .streak-bar-fill.on { background: linear-gradient(180deg, #7C3AED 0%, #6366F1 100%); }
        .streak-day.today .streak-bar-track { outline: 2px solid #C7D2FE; outline-offset: 1px; }
        .streak-day-label { font-size: 10px; font-weight: 700; color: #9CA3AF; }
        .streak-day.today .streak-day-label { color: #4F46E5; }

        /* ── Streak pill (header) ── */
        .score-pill.streak {
            background: rgba(249, 115, 22, 0.22);
            color: #FDBA74;
            border: 1px solid rgba(249, 115, 22, 0.4);
        }

        /* ── Celebration (every 10 correct) ── */
        .celebrate-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 9999;
        }

        .confetti {
            position: absolute;
            top: -16px;
            width: 10px;
            height: 14px;
            border-radius: 2px;
            opacity: 0.95;
            will-change: transform, opacity;
            animation: confetti-fall linear forwards;
        }

        @keyframes confetti-fall {
            0%   { transform: translateY(-20px) rotateZ(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotateZ(720deg); opacity: 0.9; }
        }

        .celebrate-toast {
            position: fixed;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 27, 75, 0.92);
            color: white;
            font-size: 22px;
            font-weight: 800;
            padding: 16px 28px;
            border-radius: 18px;
            box-shadow: 0 16px 50px rgba(0,0,0,0.35);
            z-index: 10000;
            pointer-events: none;
            text-align: center;
            animation: toast-pop 1.8s ease forwards;
        }

        @keyframes toast-pop {
            0%   { transform: translate(-50%, -50%) scale(0.6); opacity: 0; }
            15%  { transform: translate(-50%, -50%) scale(1.06); opacity: 1; }
            30%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            80%  { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(0.95); opacity: 0; }
        }

        @media (prefers-reduced-motion: reduce) {
            .confetti { animation-duration: 0.01ms !important; opacity: 0 !important; }
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 24px 18px 20px; }
            .self-score-btns button { font-size: 14px; padding: 12px 8px; }
            .speak-btn { width: 36px; height: 36px; font-size: 16px; }
            .streak-bar-track { height: 40px; }
            .app-title { font-size: 20px; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title">Lern Deutsch</div>
        <div class="score-bar" id="scoreBar">
            <span class="score-pill streak" id="streakPill" style="display:none">🔥 0</span>
            <span class="score-pill right" id="scoreRight">✓ 0</span>
            <span class="score-pill wrong" id="scoreWrong">✗ 0</span>
        </div>
    </header>

    <div class="toolbar" id="toolbar">
        <button class="dir-toggle" id="dirToggle" type="button" aria-pressed="false" title="Switch translation direction">EN → DE</button>
        <button class="auto-speak-toggle" id="autoSpeakToggle" type="button" title="Auto-play German audio on reveal">🔊 Auto</button>
    </div>

    <div class="tag-strip-wrapper" id="tagStripWrapper">
        <div class="tag-strip" id="tagStrip"></div>
    </div>

    <div class="progress-row" id="progressRow" style="display:none">
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>
    </div>

    <div class="card-wrap" id="cardWrap">
        <div class="status-msg" id="statusMsg">Loading exercises…</div>
    </div>

    <script>
        // ── Fallback data (mirrors exercises.yaml — used when fetch fails on file://) ──
        const FALLBACK_TAGS = [{"id":"begruessungen","label":"Begrüßungen & Verabschiedungen","description":"Greetings and farewells","exercises":[{"english":"Hello","german":"Hallo"},{"english":"Good morning","german":"Guten Morgen","explanation":"'Guten' takes the accusative -n ending (fixed greeting, short for 'Ich wünsche Ihnen einen guten Morgen'); same pattern for Guten Tag/Guten Abend."},{"english":"Good day / Good afternoon","german":"Guten Tag"},{"english":"Good evening","german":"Guten Abend"},{"english":"Good night","german":"Gute Nacht","explanation":"'Gute' (no -n) because 'Nacht' is feminine — contrast with masculine 'Guten Morgen/Tag/Abend'."},{"english":"Goodbye (formal)","german":"Auf Wiedersehen"},{"english":"Bye (informal)","german":"Tschüss"},{"english":"See you later","german":"Bis später"},{"english":"See you tomorrow","german":"Bis morgen","explanation":"'morgen' (lowercase) = tomorrow; 'der Morgen' (capitalized) = the morning — same spelling, different meaning."},{"english":"See you soon","german":"Bis bald"},{"english":"How are you? (informal)","german":"Wie geht es dir?","explanation":"Literally 'how goes it to you'; 'dir' is the dative of 'du'."},{"english":"How are you? (formal)","german":"Wie geht es Ihnen?","explanation":"'Ihnen' is the formal dative 'you' and is always capitalized."},{"english":"I'm fine, thank you","german":"Mir geht es gut, danke","explanation":"Literally 'to me it goes well'; the dative 'Mir' is fronted, so the verb 'geht' stays in second position."},{"english":"Nice to meet you","german":"Schön, dich kennenzulernen","explanation":"'kennenzulernen' is the zu-infinitive of the separable verb 'kennenlernen' — 'zu' is inserted between the prefix (kennen) and the stem (lernen)."},{"english":"Welcome","german":"Willkommen"},{"english":"Please","german":"Bitte"},{"english":"Thank you","german":"Danke"},{"english":"Thank you very much","german":"Danke schön"},{"english":"You're welcome","german":"Gern geschehen","explanation":"Fixed idiom (literally 'gladly happened'); not translated word-for-word."},{"english":"Excuse me","german":"Entschuldigung"}]},{"id":"modal_verb","label":"Modal Verbs","description":"können, müssen, dürfen, wollen, sollen, mögen, möchten","exercises":[{"english":"I can swim","german":"Ich kann schwimmen","explanation":"'können' = can/able to. Expresses ability. The infinitive (schwimmen) goes to the end."},{"english":"I must work","german":"Ich muss arbeiten","explanation":"'müssen' = must/have to. Expresses necessity or obligation. Infinitive goes to the end."},{"english":"You can drive","german":"Du kannst fahren","explanation":"'können' conjugation: ich kann, du kannst, er kann. Expresses ability."},{"english":"She must cook","german":"Sie muss kochen","explanation":"'müssen' conjugation: ich muss, du musst, sie muss. Expresses necessity."},{"english":"We want to go","german":"Wir wollen gehen","explanation":"'wollen' = to want to. Expresses desire or intention. Infinitive at the end."},{"english":"You may leave","german":"Du darfst gehen","explanation":"'dürfen' = may/to be allowed to. Expresses permission. Infinitive at the end."},{"english":"I would like a coffee","german":"Ich möchte einen Kaffee","explanation":"'möchten' = would like. Polite form of mögen. Note 'einen Kaffee' — masculine accusative."},{"english":"He should come","german":"Er soll kommen","explanation":"'sollen' = should/supposed to. Used when someone else expects this of you."},{"english":"Can you help me?","german":"Kannst du mir helfen?","explanation":"Questions with modals: verb comes first (Kannst), then subject (du). 'mir' = me (dative)."},{"english":"I must learn German","german":"Ich muss Deutsch lernen","explanation":"'müssen' = necessity. The infinitive (lernen) always goes to the end of the clause."},{"english":"We can speak German","german":"Wir können Deutsch sprechen","explanation":"'können' = ability. Infinitive (sprechen) at the end. Used for language skills."},{"english":"She wants to buy shoes","german":"Sie will Schuhe kaufen","explanation":"'wollen': 3rd person is 'will' (not 'wollen'). Infinitive (kaufen) at the end."},{"english":"May I sit here?","german":"Darf ich hier sitzen?","explanation":"'dürfen' in a question: verb first (Darf), then subject (ich). Asking permission politely."},{"english":"You should eat","german":"Du sollst essen","explanation":"'sollen' = supposed to/should. Used when someone else has told you to do something."},{"english":"I like music","german":"Ich mag Musik","explanation":"'mögen' = to like. When used directly with a noun (no infinitive), it means you like something."},{"english":"He can run fast","german":"Er kann schnell laufen","explanation":"'können' = ability. Adverbs (schnell) go before the infinitive (laufen) at the end."},{"english":"We must go home","german":"Wir müssen nach Hause gehen","explanation":"'müssen' = necessity. The full phrase 'nach Hause gehen' (go home) goes to the end."},{"english":"She would like some water","german":"Sie möchte Wasser","explanation":"'möchten' = would like. No infinitive needed when directly requesting a noun."},{"english":"Can he come?","german":"Kann er kommen?","explanation":"Modal in a question: verb first (Kann), then subject (er), then infinitive (kommen)."},{"english":"I want to sleep","german":"Ich will schlafen","explanation":"'wollen' = to want to. Expresses a strong personal desire. Infinitive at the end."},{"english":"I would like to pay","german":"Ich möchte zahlen","explanation":"'möchten' = would like to. Classic polite phrase in restaurants and shops."},{"english":"Can you please speak slowly?","german":"Können Sie bitte langsam sprechen?","explanation":"'können' with 'Sie' (formal). Polite request: modal verb first, infinitive last."},{"english":"May I help you?","german":"Darf ich Ihnen helfen?","explanation":"'dürfen' = permission/offer. 'Ihnen' is the formal dative 'you' — polite register."},{"english":"I must go to the doctor","german":"Ich muss zum Arzt gehen","explanation":"'müssen' = necessity. 'zum Arzt' = to the doctor. Full infinitive phrase at the end."},{"english":"Do I have to change trains?","german":"Muss ich umsteigen?","explanation":"'müssen' = have to. 'umsteigen' (change trains) is a separable verb used as infinitive."},{"english":"Where can I buy a ticket?","german":"Wo kann ich eine Fahrkarte kaufen?","explanation":"'Wo kann ich...?' = Where can I...? Modal stays in 2nd position; infinitive goes last."},{"english":"I would like a single room","german":"Ich möchte ein Einzelzimmer","explanation":"'möchten' = would like. Hotel request with no infinitive — directly followed by the noun."},{"english":"You must not smoke here","german":"Hier darf man nicht rauchen","explanation":"'müssen nicht' = don't have to; 'dürfen nicht' = must not/forbidden. English 'must not' is a prohibition, so German uses 'darf nicht'. 'man' = one/people."},{"english":"He can speak English","german":"Er kann Englisch sprechen","explanation":"'können' = ability. Commonly used for language skills. Infinitive at the end."},{"english":"I would like to reserve a table","german":"Ich möchte einen Tisch reservieren","explanation":"'möchten' + infinitive at the end. 'einen Tisch' = masculine accusative direct object."},{"english":"Can you help me please?","german":"Können Sie mir bitte helfen?","explanation":"'können' formal polite request (Sie form). 'mir' = me (dative, because helfen takes dative)."},{"english":"She must take the medicine","german":"Sie muss die Medizin nehmen","explanation":"'müssen' = obligation. Often used for doctor's instructions. Infinitive at the end."},{"english":"We want to visit Berlin","german":"Wir wollen Berlin besuchen","explanation":"'wollen' = intention/plan. Expresses a group desire. Infinitive (besuchen) at the end."},{"english":"You should drink more water","german":"Sie sollen mehr Wasser trinken","explanation":"'sollen' = should (advice from someone else, e.g. a doctor). Infinitive at the end."},{"english":"I would like to make an appointment","german":"Ich möchte einen Termin machen","explanation":"'möchten' + infinitive. Standard polite phrase for scheduling. 'Termin' = appointment."},{"english":"Can I pay by card?","german":"Kann ich mit Karte zahlen?","explanation":"'können' for possibility. 'mit Karte' = by card (mit takes dative). Common payment phrase."},{"english":"I would like to order","german":"Ich möchte bestellen","explanation":"'möchten' + infinitive. Standard phrase when ready to order in a restaurant."},{"english":"Can you repeat that?","german":"Können Sie das wiederholen?","explanation":"'können' formal request (Sie form). 'das wiederholen' = repeat that. Infinitive at the end."}]},{"id":"nominativ","label":"Nominativ","description":"Nominative case — subject of the sentence","exercises":[{"english":"The man is tall","german":"Der Mann ist groß","explanation":"'Der' = masculine nominative article. Mann is the subject (the one being described)."},{"english":"The woman is beautiful","german":"Die Frau ist schön","explanation":"'Die' = feminine nominative article. Frau is the subject."},{"english":"The child plays","german":"Das Kind spielt","explanation":"'Das' = neuter nominative article. Kind is the subject doing the action."},{"english":"The dog is small","german":"Der Hund ist klein","explanation":"'Der' = masculine nominative. Hund is the subject being described."},{"english":"A cat is sleeping","german":"Eine Katze schläft","explanation":"'Eine' = feminine indefinite nominative. Note 'schläft': schlafen is irregular (a→ä in er/sie/es)."},{"english":"The house is big","german":"Das Haus ist groß","explanation":"'Das' = neuter nominative. Haus is the subject being described."},{"english":"A man is coming","german":"Ein Mann kommt","explanation":"'Ein' = masculine indefinite nominative. Mann is the subject doing the action."},{"english":"The teacher is kind","german":"Der Lehrer ist nett","explanation":"'Der' = masculine nominative. Lehrer is the subject being described."},{"english":"A student learns","german":"Ein Student lernt","explanation":"'Ein' = masculine indefinite nominative. Student is the subject doing the action."},{"english":"The coffee is hot","german":"Der Kaffee ist heiß","explanation":"'Der' = masculine nominative. Kaffee is the subject."},{"english":"The car is red","german":"Das Auto ist rot","explanation":"'Das' = neuter nominative. Auto is the subject being described."},{"english":"A child is playing","german":"Ein Kind spielt","explanation":"'Ein' = neuter indefinite nominative (not 'eine' — Kind is neuter). Kind is the subject."},{"english":"The school is closed","german":"Die Schule ist geschlossen","explanation":"'Die' = feminine nominative. Schule is the subject."},{"english":"The phone rings","german":"Das Telefon klingelt","explanation":"'Das' = neuter nominative. Telefon is the subject doing the action."},{"english":"A woman is singing","german":"Eine Frau singt","explanation":"'Eine' = feminine indefinite nominative. Frau is the subject."},{"english":"The window is open","german":"Das Fenster ist offen","explanation":"'Das' = neuter nominative. Fenster is the subject."},{"english":"The door is closed","german":"Die Tür ist geschlossen","explanation":"'Die' = feminine nominative. Tür has an unpredictable feminine gender and an umlaut to memorize."},{"english":"A friend comes","german":"Ein Freund kommt","explanation":"'Ein' = masculine indefinite nominative. Freund is the subject doing the action."},{"english":"The bus is late","german":"Der Bus ist spät","explanation":"'Der' = masculine nominative. Bus is the subject."},{"english":"The book is interesting","german":"Das Buch ist interessant","explanation":"'Das' = neuter nominative. Buch is the subject being described."}]},{"id":"akkusativ","label":"Akkusativ","description":"Accusative case — direct object of the sentence","exercises":[{"english":"I see the man","german":"Ich sehe den Mann","explanation":"'der' → 'den': masculine definite article changes in accusative. Mann is the direct object."},{"english":"She loves the dog","german":"Sie liebt den Hund","explanation":"'der' → 'den': masculine definite accusative. Hund is the direct object (receiving the love)."},{"english":"He buys a book","german":"Er kauft ein Buch","explanation":"'ein' stays 'ein': neuter indefinite article is unchanged in accusative. Buch is the direct object."},{"english":"I have a cat","german":"Ich habe eine Katze","explanation":"'eine' stays 'eine': feminine indefinite is unchanged in accusative. Katze is the direct object."},{"english":"We need a car","german":"Wir brauchen ein Auto","explanation":"'ein' stays 'ein': neuter indefinite is unchanged in accusative. Auto is the direct object."},{"english":"She drinks the water","german":"Sie trinkt das Wasser","explanation":"'das' stays 'das': neuter definite is unchanged in accusative. Wasser is the direct object."},{"english":"He reads the book","german":"Er liest das Buch","explanation":"'das' stays 'das': neuter definite is unchanged in accusative. Buch is the direct object."},{"english":"We eat the bread","german":"Wir essen das Brot","explanation":"'das' stays 'das': neuter definite is unchanged in accusative. Brot is the direct object."},{"english":"She opens the door","german":"Sie öffnet die Tür","explanation":"'die' stays 'die': feminine definite is unchanged in accusative. Tür is the direct object."},{"english":"He hears the music","german":"Er hört die Musik","explanation":"'die' stays 'die': feminine definite is unchanged in accusative. Musik is the direct object."},{"english":"I love the city","german":"Ich liebe die Stadt","explanation":"'die' stays 'die': feminine definite is unchanged in accusative. Stadt is the direct object."},{"english":"She has a brother","german":"Sie hat einen Bruder","explanation":"'ein' → 'einen': masculine indefinite changes in accusative. Bruder is the direct object."},{"english":"We need ":"Er wohnt bei der Kirche","explanation":"'bei' always takes dative: 'die' -> 'der' (feminine definite dative)."},{"english":"I meet with a friend","german":"Ich treffe mich mit einem Freund","explanation":"Reflexive 'sich treffen' plus 'mit' + dative: 'ein' -> 'einem' (masculine indefinite dative)."},{"english":"She goes to the supermarket","german":"Sie geht zum Supermarkt","explanation":"'zum' = 'zu dem': preposition 'zu' always takes dative (masculine: dem)."},{"english":"He comes from Germany","german":"Er kommt aus Deutschland","explanation":"'aus' always takes dative — used for origin and countries; no article with most country names."},{"english":"I am at the station","german":"Ich bin am Bahnhof","explanation":"'am' = 'an dem': 'an' takes dative for static location (being at a place). Masculine dative."},{"english":"She gives the child the ball","german":"Sie gibt dem Kind den Ball","explanation":"'dem Kind' = dative (indirect object: to whom); 'den Ball' = accusative (direct object: what)."}]},{"id":"nomen","label":"Nomen","description":"Basic nouns with their articles","exercises":[{"english":"the house","german":"das Haus"},{"english":"the car","german":"das Auto","explanation":"'Auto' is neuter (das), not masculine — a common trap since learners expect 'der' for vehicles."},{"english":"the dog","german":"der Hund"},{"english":"the cat","german":"die Katze"},{"english":"the book","german":"das Buch"},{"english":"the table","german":"der Tisch"},{"english":"the chair","german":"der Stuhl"},{"english":"the water","german":"das Wasser"},{"english":"the bread","german":"das Brot"},{"english":"the milk","german":"die Milch","explanation":"'Milch' is feminine (die) — gender is unpredictable and must be memorised."},{"english":"the apple","german":"der Apfel","explanation":"'Apfel' is masculine (der) and takes an umlaut in the plural: die Äpfel."},{"english":"the city","german":"die Stadt","explanation":"'Stadt' is feminine (die) and has an umlaut plural: die Städte."},{"english":"the street","german":"die Straße","explanation":"'Straße' is written with ß after the long vowel; never 'Strasse' in standard German."},{"english":"the school","german":"die Schule"},{"english":"the door","german":"die Tür","explanation":"'Tür' is feminine (die) — the gender of this short word is unpredictable and must be learned."},{"english":"the window","german":"das Fenster","explanation":"'Fenster' is neuter (das); the -er ending often looks masculine but here it is not."},{"english":"the phone","german":"das Telefon","explanation":"'Telefon' is neuter (das); the gender is not guessable from the word."},{"english":"the bag","german":"die Tasche"},{"english":"the key","german":"der Schlüssel","explanation":"'Schlüssel' is masculine (der); most nouns ending in -el are masculine (der Löffel, der Mantel)."},{"english":"the time","german":"die Zeit","explanation":"'Zeit' is feminine (die) — like many abstract nouns its gender must be memorised."}]},{"id":"artikel","label":"Artikel","description":"der / die / das — German definite articles","exercises":[{"english":"the man","german":"der Mann"},{"english":"the woman","german":"die Frau"},{"english":"the child","german":"das Kind","explanation":"'das Kind': neuter, even though it refers to a person — gender here is grammatical, not natural."},{"english":"the tree","german":"der Baum","explanation":"'der Baum': masculine and takes an umlaut in the plural 'Bäume'."},{"english":"the flower","german":"die Blume"},{"english":"the house","german":"das Haus"},{"english":"the book","german":"das Buch","explanation":"'das Buch': neuter — learners often wrongly expect 'der'."},{"english":"the cat","german":"die Katze","explanation":"'die Katze': feminine as a noun regardless of the animal's actual sex."},{"english":"the dog","german":"der Hund"},{"english":"the car","german":"das Auto","explanation":"'das Auto': neuter loanword; learners often wrongly guess 'der'."},{"english":"the school","german":"die Schule"},{"english":"the table","german":"der Tisch"},{"english":"the door","german":"die Tür","explanation":"'die Tür': feminine and umlauted; frequently mis-gendered."},{"english":"the window","german":"das Fenster","explanation":"'das Fenster': neuter, even though the -er ending often signals masculine (e.g. der Computer)."},{"english":"the city","german":"die Stadt","explanation":"'die Stadt': feminine; note the umlauted plural 'Städte'."},{"english":"the country","german":"das Land","explanation":"'das Land': neuter; the umlauted plural is 'Länder'."},{"english":"the apple","german":"der Apfel","explanation":"'der Apfel': masculine and takes an umlaut in the plural 'Äpfel'."},{"english":"the bottle","german":"die Flasche"},{"english":"the key","german":"der Schlüssel","explanation":"'der Schlüssel': masculine; the gender of -el nouns is not predictable and must be memorized."},{"english":"the letter","german":"der Brief","explanation":"'der Brief': masculine; means a postal letter (not 'letter' as in alphabet, which is 'der Buchstabe')."}]},{"id":"verben","label":"Verben","description":"Basic A1 verbs conjugated in present tense","exercises":[{"english":"I go","german":"Ich gehe"},{"english":"You come","german":"Du kommst"},{"english":"He / she eats","german":"Er / sie isst","explanation":"'essen' is irregular with an e→i stem change in 2nd/3rd person: ich esse, du isst, er/sie isst."},{"english":"We drink","german":"Wir trinken"},{"english":"They sleep","german":"Sie schlafen","explanation":"'schlafen' adds an umlaut (a→ä) in the singular (du schläfst, er schläft), but the plural 'sie schlafen' is regular."},{"english":"I work","german":"Ich arbeite","explanation":"'arbeiten' inserts an extra -e- before consonant endings for pronounceability: du arbeitest, er/sie arbeitet."},{"english":"You learn","german":"Du lernst"},{"english":"He / she speaks","german":"Er / sie spricht","explanation":"'sprechen' is a strong verb with an e→i stem change: du sprichst, er/sie spricht."},{"english":"We live","german":"Wir wohnen"},{"english":"They play","german":"Sie spielen"},{"english":"I read","german":"Ich lese","explanation":"'lesen' has an e→ie stem change in 2nd/3rd person singular: du liest, er/sie liest."},{"english":"You write","german":"Du schreibst"},{"english":"He / she runs","german":"Er / sie läuft","explanation":"'laufen' takes an umlaut (au→äu) in 2nd/3rd person singular: du läufst, er/sie läuft."},{"english":"We swim","german":"Wir schwimmen"},{"english":"They cook","german":"Sie kochen"},{"english":"I drive","german":"Ich fahre","explanation":"'fahren' takes an umlaut (a→ä) in 2nd/3rd person singular: du fährst, er/sie fährt."},{"english":"You help","german":"Du hilfst","explanation":"'helfen' has an e→i stem change in 2nd/3rd person singular: du hilfst, er/sie hilft."},{"english":"He / she sings","german":"Er / sie singt"},{"english":"We travel","german":"Wir reisen"},{"english":"They buy","german":"Sie kaufen"}]},{"id":"adjektive","label":"Adjektive","description":"Common A1 adjectives","exercises":[{"english":"big","german":"groß"},{"english":"small","german":"klein"},{"english":"good","german":"gut"},{"english":"bad","german":"schlecht"},{"english":"fast","german":"schnell"},{"english":"slow","german":"langsam"},{"english":"hot","german":"heiß","explanation":"'heiß' describes things/weather; for feeling hot say 'Mir ist heiß' — 'Ich bin heiß' means 'I'm aroused'."},{"english":"cold","german":"kalt"},{"english":"new","german":"neu"},{"english":"old","german":"alt"},{"english":"beautiful","german":"schön"},{"english":"expensive","german":"teuer","explanation":"'teuer' drops the inner 'e' when inflected: teure Schuhe, not teuere."},{"english":"cheap","german":"günstig"},{"english":"happy","german":"glücklich"},{"english":"sad","german":"traurig"},{"english":"tired","german":"müde"},{"english":"hungry","german":"hungrig"},{"english":"thirsty","german":"durstig"},{"english":"interesting","german":"interessant"},{"english":"easy","german":"einfach"}]},{"id":"zahlen","label":"Zahlen","description":"Numbers and counting","exercises":[{"english":"one","german":"eins"},{"english":"two","german":"zwei"},{"english":"three","german":"drei"},{"english":"four","german":"vier"},{"english":"five","german":"fünf"},{"english":"six","german":"sechs"},{"english":"seven","german":"sieben"},{"english":"eight","german":"acht"},{"english":"nine","german":"neun"},{"english":"ten","german":"zehn"},{"english":"eleven","german":"elf"},{"english":"twelve","german":"zwölf"},{"english":"twenty","german":"zwanzig"},{"english":"thirty","german":"dreißig","explanation":"Spelled '-ßig' (dreißig), not '-zig' like the other tens (zwanzig, vierzig) — a common spelling trap."},{"english":"one hundred","german":"hundert","explanation":"German omits 'ein' here: just 'hundert' (or 'einhundert'), unlike English 'one/a hundred'."},{"english":"one thousand","german":"tausend","explanation":"German omits 'ein' here: just 'tausend' (or 'eintausend'), unlike English 'one/a thousand'."},{"english":"How old are you?","german":"Wie alt bist du?"},{"english":"I am 25 years old","german":"Ich bin fünfundzwanzig Jahre alt","explanation":"Compound numbers are one word with units before tens joined by 'und': fünfundzwanzig (literally 'five-and-twenty')."},{"english":"It costs 5 euros","german":"Es kostet fünf Euro","explanation":"'Euro' stays uninflected after a number (fünf Euro, not 'Euros'); currency units take no plural ending here."},{"english":"I need two tickets","german":"Ich brauche zwei Tickets"}]},{"id":"farben","label":"Farben","description":"Colors","exercises":[{"english":"red","german":"rot"},{"english":"blue","german":"blau"},{"english":"green","german":"grün"},{"english":"yellow","german":"gelb"},{"english":"black","german":"schwarz"},{"english":"white","german":"weiß"},{"english":"orange","german":"orange"},{"english":"pink","german":"rosa"},{"english":"purple","german":"lila"},{"english":"brown","german":"braun"},{"english":"grey","german":"grau"},{"english":"The car is red","german":"Das Auto ist rot"},{"english":"The sky is blue","german":"Der Himmel ist blau"},{"english":"The grass is green","german":"Das Gras ist grün"},{"english":"The sun is yellow","german":"Die Sonne ist gelb"},{"english":"My bag is black","german":"Meine Tasche ist schwarz"},{"english":"The snow is white","german":"Der Schnee ist weiß"},{"english":"The rose is pink","german":"Die Rose ist rosa"},{"english":"What color is it?","german":"Welche Farbe hat es?","explanation":"German uses 'haben' (to have) for color, not 'sein' (to be): literally 'What color does it have?'"},{"english":"I like green","german":"Ich mag Grün","explanation":"As a noun a color is neuter and capitalized ('das Grün'); the predicative adjective stays lowercase ('ist grün')."}]},{"id":"familie","label":"Familie","description":"Family members","exercises":[{"english":"mother","german":"die Mutter"},{"english":"father","german":"der Vater"},{"english":"sister","german":"die Schwester"},{"english":"brother","german":"der Bruder"},{"english":"grandmother","german":"die Großmutter"},{"english":"grandfather","german":"der Großvater"},{"english":"daughter","german":"die Tochter"},{"english":"son","german":"der Sohn"},{"english":"aunt","german":"die Tante"},{"english":"uncle","german":"der Onkel"},{"english":"cousin (female)","german":"die Cousine"},{"english":"cousin (male)","german":"der Cousin"},{"english":"wife","german":"die Frau / Ehefrau"},{"english":"husband","german":"der Mann / Ehemann"},{"english":"parents","german":"die Eltern","explanation":"'die Eltern' is a plural-only noun — no singular form, always takes plural 'die'."},{"english":"children","german":"die Kinder","explanation":"Irregular plural of 'das Kind' → 'die Kinder' (-er plural); plural article is always 'die'."},{"english":"grandparents","german":"die Großeltern","explanation":"'die Großeltern' is plural-only, like 'Eltern' — no singular form."},{"english":"My mother is kind","german":"Meine Mutter ist nett"},{"english":"I have two brothers","german":"Ich habe zwei Brüder","explanation":"Plural of 'der Bruder' is 'die Brüder' — the -u- takes an umlaut, no ending added."},{"english":"Her sister is a doctor","german":"Ihre Schwester ist Ärztin","explanation":"No article before professions: 'ist Ärztin', not 'ist eine Ärztin'; feminine adds -in and umlauts: 'Arzt' → 'Ärztin'."}]},{"id":"essen_trinken","label":"Essen & Trinken","description":"Food and drink vocabulary","exercises":[{"english":"bread","german":"das Brot"},{"english":"water","german":"das Wasser"},{"english":"coffee","german":"der Kaffee"},{"english":"tea","german":"der Tee"},{"english":"milk","german":"die Milch"},{"english":"apple","german":"der Apfel"},{"english":"banana","german":"die Banane"},{"english":"cheese","german":"der Käse","explanation":"'der Käse' is masculine despite the -e ending that often signals feminine."},{"english":"butter","german":"die Butter","explanation":"'die Butter' is feminine — not predictable; English speakers often guess wrong."},{"english":"eggs","german":"die Eier","explanation":"Irregular plural: das Ei → die Eier."},{"english":"meat","german":"das Fleisch"},{"english":"fish","german":"der Fisch"},{"english":"soup","german":"die Suppe"},{"english":"cake","german":"der Kuchen"},{"english":"juice","german":"der Saft"},{"english":"beer","german":"das Bier"},{"english":"wine","german":"der Wein"},{"english":"I like coffee","german":"Ich mag Kaffee","explanation":"'mögen' is irregular: ich mag (no -e ending), du magst, er/sie mag."},{"english":"I eat bread","german":"Ich esse Brot","explanation":"'essen' is irregular (e→i): ich esse, du isst, er/sie isst."},{"english":"I drink water","german":"Ich trinke Wasser"}]},{"id":"wochentage","label":"Wochentage","description":"Days of the week and time expressions","exercises":[{"english":"Monday","german":"Montag"},{"english":"Tuesday","german":"Dienstag"},{"english":"Wednesday","german":"Mittwoch"},{"english":"Thursday","german":"Donnerstag"},{"english":"Friday","german":"Freitag"},{"english":"Saturday","german":"Samstag"},{"english":"Sunday","german":"Sonntag"},{"english":"today","german":"heute"},{"english":"tomorrow","german":"morgen","explanation":"False-friend trap: lowercase 'morgen' = tomorrow, but capitalized 'der Morgen' = (the) morning."},{"english":"yesterday","german":"gestern"},{"english":"the day after tomorrow","german":"übermorgen"},{"english":"the day before yesterday","german":"vorgestern"},{"english":"On Monday","german":"Am Montag","explanation":"'am' = 'an dem'; days of the week take 'an' + dative, contracted to 'am'."},{"english":"Every Friday","german":"Jeden Freitag","explanation":"'jeden' is masculine accusative of 'jeder'; recurring time points use the bare accusative (no preposition)."},{"english":"Next Monday","german":"Nächsten Montag","explanation":"'nächsten' takes the masculine accusative ending; future time points stand in the bare accusative without a preposition."},{"english":"Last Tuesday","german":"Letzten Dienstag","explanation":"'letzten' is masculine accusative; past time points use the bare accusative (no preposition)."},{"english":"What day is today?","german":"Welcher Tag ist heute?","explanation":"'Welcher' is masculine nominative agreeing with der Tag, the subject of the sentence."},{"english":"I work on Mondays","german":"Ich arbeite montags","explanation":"'montags' (lowercase, with -s) means 'on Mondays / habitually'; this time adverb is lowercase even though the day name Montag is capitalized."},{"english":"On the weekend","german":"Am Wochenende","explanation":"Fixed expression 'am Wochenende' (an dem Wochenende); das Wochenende is neuter."},{"english":"weekday","german":"der Werktag","explanation":"'der Werktag' means a working day (Mon–Fri); do not confuse with 'der Wochentag' = any day of the week."}]},{"id":"monate","label":"Monate & Jahreszeiten","description":"Months and seasons","exercises":[{"english":"January","german":"Januar"},{"english":"February","german":"Februar"},{"english":"March","german":"März"},{"english":"April","german":"April"},{"english":"May","german":"Mai"},{"english":"June","german":"Juni"},{"english":"July","german":"Juli"},{"english":"August","german":"August"},{"english":"September","german":"September"},{"english":"October","german":"Oktober"},{"english":"November","german":"November"},{"english":"December","german":"Dezember"},{"english":"What month is it?","german":"Welcher Monat ist es?","explanation":"'Welcher' is the masculine W-question word agreeing with 'der Monat'; months are masculine."},{"english":"In January","german":"Im Januar","explanation":"Months take 'im' (= in dem) for 'in [month]': im Januar, im Juni."},{"english":"My birthday is in June","german":"Mein Geburtstag ist im Juni","explanation":"'im Juni' = in June; months always use 'im' (in dem) for 'in'."},{"english":"spring","german":"der Frühling","explanation":"All four seasons are masculine: der Frühling, der Sommer, der Herbst, der Winter."},{"english":"summer","german":"der Sommer"},{"english":"autumn","german":"der Herbst"},{"english":"winter","german":"der Winter"},{"english":"In winter it is cold","german":"Im Winter ist es kalt","explanation":"Fronted time phrase 'Im Winter' forces verb-second order: 'ist' comes before the subject 'es'."}]},{"id":"personliche_info","label":"Persönliche Informationen","description":"Introducing yourself — name, age, origin, job (telc A1 Sprechen/Schreiben)","exercises":[{"english":"What is your name? (formal)","german":"Wie heißen Sie?","explanation":"Idiom: German uses 'Wie heißen Sie?' (literally 'how are you called?'), with 'wie', not 'was'."},{"english":"What is your name? (informal)","german":"Wie heißt du?","explanation":"'heißen' is irregular: 'du heißt' takes only -t (no extra -st) because the stem ends in ß."},{"english":"My name is Anna","german":"Ich heiße Anna"},{"english":"Where do you come from?","german":"Woher kommen Sie?","explanation":"'woher' = from where (origin); 'wo' alone only means 'where' (location)."},{"english":"I come from India","german":"Ich komme aus Indien","explanation":"Origin uses 'aus' (+ dative); country names like Indien take no article here."},{"english":"Where do you live?","german":"Wo wohnen Sie?"},{"english":"I live in Berlin","german":"Ich wohne in Berlin"},{"english":"How old are you? (formal)","german":"Wie alt sind Sie?","explanation":"German states age with 'sein' (to be), not 'haben': 'Wie alt sind Sie?'."},{"english":"I am 30 years old","german":"Ich bin 30 Jahre alt","explanation":"Age uses 'sein' + 'Jahre alt'; literally 'I am 30 years old'."},{"english":"What is your job?","german":"Was machen Sie beruflich?","explanation":"Fixed idiom 'Was machen Sie beruflich?' (literally 'what do you do professionally?'); 'beruflich' goes to the end."},{"english":"I am a teacher","german":"Ich bin Lehrer","explanation":"No article before a profession: 'Ich bin Lehrer', not 'ein Lehrer'."},{"english":"What is your phone number?","german":"Was ist Ihre Telefonnummer?","explanation":"Formal possessive 'Ihre' is capitalized; the informal equivalent would be 'deine'."},{"english":"What is your email address?","german":"Was ist Ihre E-Mail-Adresse?"},{"english":"Are you married?","german":"Sind Sie verheiratet?"},{"english":"I am married","german":"Ich bin verheiratet"},{"english":"I am single","german":"Ich bin ledig","explanation":"'ledig' is the standard term for unmarried; do not use 'single' or 'allein'."},{"english":"Do you have children?","german":"Haben Sie Kinder?"},{"english":"I have two children","german":"Ich habe zwei Kinder"},{"english":"What language do you speak?","german":"Welche Sprache sprechen Sie?"},{"english":"I speak English and German","german":"Ich spreche Englisch und Deutsch","explanation":"Language names are nouns and capitalized: 'Englisch', 'Deutsch'."}]},{"id":"tagesablauf","label":"Tagesablauf","description":"Daily routine — a key telc A1 reading and writing topic","exercises":[{"english":"I get up at 7 o'clock","german":"Ich stehe um 7 Uhr auf","explanation":"Separable verb 'aufstehen': the prefix 'auf' splits off and goes to the end of the clause."},{"english":"I brush my teeth","german":"Ich putze mir die Zähne","explanation":"Uses the dative reflexive 'mir' ('to/for myself') with 'die Zähne'; literally 'I clean myself the teeth'."},{"english":"I have breakfast","german":"Ich frühstücke","explanation":"German uses the single verb 'frühstücken'; there is no 'have' construction."},{"english":"I go to work","german":"Ich gehe zur Arbeit","explanation":"'zur' = 'zu der'; 'zu' always takes the dative (here 'die Arbeit' → 'der Arbeit')."},{"english":"I start work at 8","german":"Ich fange um 8 Uhr an","explanation":"Separable verb 'anfangen': the prefix 'an' moves to the end of the clause."},{"english":"I have a lunch break","german":"Ich mache Mittagspause","explanation":"Idiomatic: German uses 'machen' (not 'haben') and drops the article: 'Mittagspause machen'."},{"english":"I eat lunch","german":"Ich esse zu Mittag","explanation":"Fixed phrase 'zu Mittag essen' (no article); 'zu' here means 'for' the meal."},{"english":"I finish work at 5","german":"Ich höre um 17 Uhr auf","explanation":"Separable verb 'aufhören' (to stop); '17 Uhr' is the normal 24-hour way to say 5 pm."},{"english":"I go home","german":"Ich gehe nach Hause","explanation":"Fixed phrase 'nach Hause' (motion); note 'nach Hause' = going home, but 'zu Hause' = being at home."},{"english":"I cook dinner","german":"Ich koche Abendessen"},{"english":"I eat dinner","german":"Ich esse zu Abend","explanation":"Fixed phrase 'zu Abend essen' (no article), parallel to 'zu Mittag essen'."},{"english":"I watch TV","german":"Ich schaue fern","explanation":"Separable verb 'fernschauen': 'fern' goes to the end; the more standard variant is 'Ich sehe fern' (fernsehen)."},{"english":"I read a book","german":"Ich lese ein Buch"},{"english":"I go to bed","german":"Ich gehe schlafen","explanation":"German says 'schlafen gehen' (literally 'go to sleep'); the bare infinitive 'schlafen' goes to the end."},{"english":"I take a shower","german":"Ich dusche"},{"english":"I drink coffee in the morning","german":"Ich trinke morgens Kaffee","explanation":"'morgens' (with -s) is an adverb meaning 'in the mornings / every morning', distinct from the noun 'der Morgen'."},{"english":"I take the bus to work","german":"Ich fahre mit dem Bus zur Arbeit","explanation":"German says 'mit dem Bus fahren' (travel by bus); 'mit' always takes the dative."},{"english":"I sleep 8 hours","german":"Ich schlafe 8 Stunden"},{"english":"On weekends I go for a walk","german":"Am Wochenende gehe ich spazieren","explanation":"Fronting the time phrase forces verb-second word order, so the verb precedes the subject ('gehe ich'); 'spazieren gehen' puts the infinitive at the end."},{"english":"I go shopping on Saturday","german":"Ich gehe am Samstag einkaufen","explanation":"Separable verb 'einkaufen'; as an infinitive after 'gehen' the whole 'einkaufen' stands at the end of the clause."}]},{"id":"einkaufen","label":"Einkaufen","description":"Shopping — prices, quantities, asking for items (telc A1 Lesen/Schreiben)","exercises":[{"english":"How much does it cost?","german":"Was kostet das?"},{"english":"It costs 5 euros","german":"Es kostet 5 Euro","explanation":"'Euro' stays singular after a number (5 Euro, not 'Euros') — currency units are uninflected here."},{"english":"I would like to buy this","german":"Ich möchte das kaufen"},{"english":"That is too expensive","german":"Das ist zu teuer"},{"english":"I will take it","german":"Ich nehme es","explanation":"German uses the present tense 'nehme' for this near-future intent — no separate future form needed."},{"english":"How can I help you?","german":"Wie kann ich Ihnen helfen?","explanation":"'helfen' takes the dative, so formal 'you' is 'Ihnen', not 'Sie'."},{"english":"I am just looking","german":"Ich schaue nur","explanation":"'Ich schaue nur' is the fixed shop phrase for 'just browsing' — 'nur' (only) carries the 'just'."},{"english":"Do you accept cards?","german":"Akzeptieren Sie Karten?"},{"english":"Where is the checkout?","german":"Wo ist die Kasse?","explanation":"'die Kasse' (feminine) is the checkout/till — the pay point, not 'cash'."},{"english":"A kilo of apples please","german":"Ein Kilo Äpfel bitte","explanation":"No 'von'/'of' — German says bare 'Kilo Äpfel'; the plural of Apfel takes an umlaut: Äpfel."},{"english":"A bottle of water please","german":"Eine Flasche Wasser bitte"},{"english":"I would like to pay","german":"Ich möchte bezahlen"},{"english":"The receipt please","german":"Die Quittung bitte"},{"english":"Here is the change","german":"Hier ist das Wechselgeld","explanation":"'das Wechselgeld' (neuter) means the money given back — learn the compound as one word."},{"english":"Do you have this in a different size?","german":"Haben Sie das in einer anderen Größe?","explanation":"'in' takes the dative here, giving 'einer anderen Größe' (feminine dative, adjective ending -en)."},{"english":"Is the shop open?","german":"Ist das Geschäft geöffnet?"},{"english":"The shop is closed on Sundays","german":"Das Geschäft ist sonntags geschlossen","explanation":"Lowercase 'sonntags' means 'on Sundays (habitually)', distinct from capitalised 'Sonntag' (the day itself)."},{"english":"I need milk and bread","german":"Ich brauche Milch und Brot"},{"english":"A half kilo of cheese","german":"Ein halbes Kilo Käse","explanation":"'Kilo' is neuter, so 'half' is 'halbes'; and no 'von'/'of' before 'Käse'."},{"english":"That costs 3 euros 50","german":"Das kostet 3 Euro 50","explanation":"German states prices as '3 Euro 50' — no word for 'cents' and no 'und' between the parts."}]},{"id":"richtungen","label":"Richtungen & Orte","description":"Asking for and giving directions (telc A1 Hören/Lesen)","exercises":[{"english":"Excuse me, where is the train station?","german":"Entschuldigung, wo ist der Bahnhof?"},{"english":"Go straight ahead","german":"Gehen Sie geradeaus","explanation":"'geradeaus' is one word (spelling trap) and means 'straight ahead'."},{"english":"Turn left","german":"Biegen Sie links ab","explanation":"Separable verb 'abbiegen': the prefix 'ab' splits off to the end (Biegen Sie ... ab)."},{"english":"Turn right","german":"Biegen Sie rechts ab","explanation":"Separable verb 'abbiegen': the prefix 'ab' goes to the end of the clause (Biegen Sie ... ab)."},{"english":"The bank is on the left","german":"Die Bank ist links"},{"english":"The pharmacy is on the right","german":"Die Apotheke ist rechts"},{"english":"It is near here","german":"Es ist hier in der Nähe","explanation":"'in der Nähe' is a fixed dative phrase meaning 'nearby/in the vicinity'."},{"english":"It is far away","german":"Es ist weit weg"},{"english":"How far is it?","german":"Wie weit ist es?"},{"english":"About 500 metres","german":"Ungefähr 500 Meter","explanation":"After a number, 'Meter' stays singular (no plural -s) — 'fünfhundert Meter'."},{"english":"At the traffic lights","german":"An der Ampel","explanation":"die Ampel (feminine); 'an' takes the dative for location, so 'die' → 'der'."},{"english":"At the crossroads","german":"An der Kreuzung","explanation":"die Kreuzung (feminine); 'an' + dative for location, so 'die' → 'der'."},{"english":"Next to the church","german":"Neben der Kirche","explanation":"'neben' takes the dative for location (no movement); feminine 'die Kirche' → 'der Kirche'."},{"english":"Opposite the school","german":"Gegenüber der Schule","explanation":"'gegenüber' takes the dative: feminine 'die Schule' → 'der Schule'."},{"english":"Where is the bus stop?","german":"Wo ist die Bushaltestelle?"},{"english":"Is there a post office nearby?","german":"Gibt es hier in der Nähe eine Post?","explanation":"die Post (feminine) = post office; 'es gibt' takes the accusative — feminine 'eine' is unchanged."},{"english":"I am looking for the supermarket","german":"Ich suche den Supermarkt","explanation":"'suchen' takes a direct (accusative) object: masculine 'der Supermarkt' → 'den Supermarkt'."},{"english":"Please speak slowly","german":"Bitte sprechen Sie langsam"},{"english":"I don't understand","german":"Ich verstehe nicht"},{"english":"Can you repeat that please?","german":"Können Sie das bitte wiederholen?"}]},{"id":"uhrzeit","label":"Uhrzeit","description":"Telling the time — a core telc A1 topic","exercises":[{"english":"What time is it?","german":"Wie spät ist es?","explanation":"Idiom: literally 'how late is it?' — German uses 'spät' (late), there is no word for 'time' here."},{"english":"It is 8 o'clock","german":"Es ist 8 Uhr"},{"english":"It is half past 3","german":"Es ist halb vier","explanation":"Trap: 'halb vier' literally means 'half (to) four' = 3:30, so German names the NEXT hour, not the current one."},{"english":"It is quarter past 5","german":"Es ist Viertel nach fünf","explanation":"'Viertel' is capitalized because it functions as a noun (a quarter); 'nach' = past."},{"english":"It is quarter to 7","german":"Es ist Viertel vor sieben","explanation":"'vor' = to/before the hour: 'Viertel vor sieben' = 6:45."},{"english":"At what time does the train leave?","german":"Um wie viel Uhr fährt der Zug ab?","explanation":"Separable verb 'abfahren': the prefix 'ab' goes to the very end of the clause (...fährt der Zug ab)."},{"english":"The train leaves at 9:15","german":"Der Zug fährt um 9:15 Uhr ab","explanation":"Separable verb 'abfahren': the prefix 'ab' is sent to the end (Der Zug fährt um 9:15 Uhr ab)."},{"english":"The shop opens at 9","german":"Das Geschäft öffnet um 9 Uhr"},{"english":"The shop closes at 8 pm","german":"Das Geschäft schließt um 20 Uhr"},{"english":"In the morning","german":"Am Morgen"},{"english":"In the afternoon","german":"Am Nachmittag"},{"english":"In the evening","german":"Am Abend"},{"english":"At noon","german":"Am Mittag","explanation":"'am' = 'an dem'; time-of-day points take 'an' + dative, parallel to Am Morgen / Am Abend."},{"english":"At midnight","german":"Um Mitternacht","explanation":"Fixed phrase: 'um Mitternacht' uses 'um' with no article, unlike Am Morgen / Am Mittag."},{"english":"The film starts at 8 pm","german":"Der Film beginnt um 20 Uhr"},{"english":"How long does it take?","german":"Wie lange dauert es?"},{"english":"It takes one hour","german":"Es dauert eine Stunde"},{"english":"I have an appointment at 3","german":"Ich habe um 3 Uhr einen Termin","explanation":"Time before object: 'um 3 Uhr' comes before 'einen Termin' (time expressions precede other elements)."},{"english":"It is 10 past 6","german":"Es ist 10 nach sechs","explanation":"'nach' = past the hour; the hour name is not capitalized (sechs)."},{"english":"It is 20 to 9","german":"Es ist 20 vor neun","explanation":"'vor' = to/before the hour: '20 vor neun' = 8:40."}]},{"id":"gesundheit","label":"Gesundheit","description":"Health and illness vocabulary (telc A1 Sprechen/Hören)","exercises":[{"english":"I have a headache","german":"Ich habe Kopfschmerzen","explanation":"'Kopf' (head) + plural '-schmerzen' (pains): German names aches as a compound with plural Schmerzen."},{"english":"I have a stomach ache","german":"Ich habe Bauchschmerzen","explanation":"'Bauch' (belly) + '-schmerzen', like Kopfschmerzen; the body part compounds with plural Schmerzen."},{"english":"I am sick","german":"Ich bin krank"},{"english":"I feel unwell","german":"Mir ist nicht gut","explanation":"Dative idiom, literally 'to-me is not good': uses 'mir' (dative), no 'ich' subject."},{"english":"I have a cold","german":"Ich habe eine Erkältung","explanation":"'die Erkältung' (feminine) = a cold/illness — not the adjective 'kalt' (cold temperature)."},{"english":"I have a fever","german":"Ich habe Fieber","explanation":"'Fieber' takes no article here: 'Fieber haben' (to have a fever) is used without ein."},{"english":"I need a doctor","german":"Ich brauche einen Arzt","explanation":"'ein' → 'einen': Arzt is masculine and the accusative object of brauchen."},{"english":"Where is the pharmacy?","german":"Wo ist die Apotheke?","explanation":"'die Apotheke' = pharmacy for medicine; a 'Drogerie' only sells toiletries/non-prescription goods."},{"english":"I am allergic to penicillin","german":"Ich bin allergisch gegen Penicillin","explanation":"Fixed preposition: 'allergisch gegen' (literally 'against'), not 'zu', for allergic to."},{"english":"How often should I take this?","german":"Wie oft soll ich das nehmen?","explanation":"Modal 'soll' goes second and the infinitive 'nehmen' goes to the end."},{"english":"Three times a day","german":"Dreimal täglich","explanation":"'dreimal' = three times, written as one word (Zahl + -mal); 'täglich' = daily."},{"english":"I have a toothache","german":"Ich habe Zahnschmerzen"},{"english":"My arm hurts","german":"Mein Arm tut weh","explanation":"'wehtun' is separable: the prefix 'weh' moves to the end — 'tut ... weh'."},{"english":"I cannot sleep","german":"Ich kann nicht schlafen","explanation":"Modal 'kann' is second and the infinitive 'schlafen' goes to the end."},{"english":"I feel better today","german":"Ich fühle mich heute besser","explanation":"'sich fühlen' is reflexive, so 'mich' is required: 'Ich fühle mich ...'."},{"english":"I need to see a doctor","german":"Ich muss zum Arzt gehen","explanation":"'zum' = zu dem (dative): 'zum Arzt gehen' is the fixed way to say 'go to the doctor'."},{"english":"Please call an ambulance","german":"Rufen Sie bitte einen Krankenwagen","explanation":"Polite imperative: verb 'Rufen' first, then 'Sie'; 'einen Krankenwagen' is masculine accusative."},{"english":"I need a prescription","german":"Ich brauche ein Rezept","explanation":"'das Rezept' (neuter) means both 'prescription' and 'recipe'; here 'ein Rezept'."},{"english":"the hospital","german":"das Krankenhaus"},{"english":"the doctor's surgery","german":"die Arztpraxis","explanation":"'die Arztpraxis' (feminine) = doctor's office/practice, from 'Praxis'."}]},{"id":"wohnen","label":"Wohnen","description":"Rooms, housing, and accommodation (telc A1 Lesen/Schreiben)","exercises":[{"english":"the bedroom","german":"das Schlafzimmer"},{"english":"the kitchen","german":"die Küche"},{"english":"the bathroom","german":"das Badezimmer"},{"english":"the living room","german":"das Wohnzimmer"},{"english":"the dining room","german":"das Esszimmer"},{"english":"the toilet","german":"die Toilette"},{"english":"the garden","german":"der Garten"},{"english":"the balcony","german":"der Balkon"},{"english":"the entrance hall","german":"der Flur","explanation":"'der Flur' (hallway/corridor) is masculine and its gender is not predictable from the meaning."},{"english":"the apartment","german":"die Wohnung"},{"english":"the ground floor","german":"das Erdgeschoss"},{"english":"the first floor","german":"das erste Stockwerk","explanation":"False friend: 'erstes Stockwerk' / 'erster Stock' is the floor ABOVE ground level (US second floor); ground level is 'das Erdgeschoss'."},{"english":"the rent","german":"die Miete"},{"english":"the landlord","german":"der Vermieter"},{"english":"I live in a flat","german":"Ich wohne in einer Wohnung","explanation":"'wohnen in' takes the dative for location, so feminine 'die Wohnung' becomes 'in einer Wohnung'."},{"english":"The apartment has 3 rooms","german":"Die Wohnung hat 3 Zimmer"},{"english":"The rent is 800 euros","german":"Die Miete beträgt 800 Euro","explanation":"'betragen' (to amount to) is irregular: a→ä, so 'sie beträgt'. 'Euro' stays singular after a number."},{"english":"I am looking for a flat","german":"Ich suche eine Wohnung"},{"english":"Is heating included?","german":"Ist die Heizung inklusive?"},{"english":"The flat is on the second floor","german":"Die Wohnung ist im zweiten Stockwerk","explanation":"'im' = 'in dem': dative for static location; note 'zweites Stockwerk' counts from above the ground floor (Erdgeschoss)."}]},{"id":"hobbys","label":"Freizeit & Hobbys","description":"Leisure and hobbies — telc A1 Sprechen topic","exercises":[{"english":"What do you do in your free time?","german":"Was machen Sie in Ihrer Freizeit?","explanation":"'in' takes the dative here: 'in Ihrer Freizeit'; 'die Freizeit' is feminine."},{"english":"I like reading","german":"Ich lese gern","explanation":"'gern' after the verb expresses liking an activity; 'lesen' is irregular (du liest, er liest)."},{"english":"I like cooking","german":"Ich koche gern"},{"english":"I play football","german":"Ich spiele Fußball"},{"english":"I go swimming","german":"Ich gehe schwimmen","explanation":"Two verbs: conjugated 'gehe' in second position, infinitive 'schwimmen' at the end."},{"english":"I watch films","german":"Ich schaue Filme"},{"english":"I listen to music","german":"Ich höre Musik"},{"english":"I go for walks","german":"Ich gehe spazieren","explanation":"Fixed phrase 'spazieren gehen'; the infinitive 'spazieren' goes to the end."},{"english":"I travel","german":"Ich reise"},{"english":"I paint","german":"Ich male"},{"english":"I play guitar","german":"Ich spiele Gitarre","explanation":"No article before instruments: 'Gitarre spielen', not 'die Gitarre'."},{"english":"I do sport","german":"Ich mache Sport","explanation":"German uses the collocation 'Sport machen', not 'tun' or 'spielen'."},{"english":"I go to the gym","german":"Ich gehe ins Fitnessstudio","explanation":"'ins' = 'in das': accusative for movement/direction; 'das Fitnessstudio'."},{"english":"I meet friends","german":"Ich treffe Freunde","explanation":"'treffen' is irregular (du triffst, er trifft), though 'ich treffe' is regular."},{"english":"I play computer games","german":"Ich spiele Computerspiele"},{"english":"I dance","german":"Ich tanze"},{"english":"I take photos","german":"Ich mache Fotos","explanation":"Collocation 'Fotos machen' — German 'makes' photos rather than 'takes' them."},{"english":"I go cycling","german":"Ich fahre Fahrrad","explanation":"Collocation 'Fahrrad fahren'; 'fahren' is irregular (du fährst, er fährt)."},{"english":"What are your hobbies?","german":"Was sind Ihre Hobbys?","explanation":"Plural of 'das Hobby' is 'Hobbys' (English-style -s, not -en)."},{"english":"I like hiking","german":"Ich wandere gern","explanation":"Stem 'wander-' ends in -er, so the ich-ending is just -e: 'ich wandere'."}]},{"id":"wetter","label":"Wetter","description":"Weather expressions (telc A1 Lesen/Hören)","exercises":[{"english":"What is the weather like?","german":"Wie ist das Wetter?"},{"english":"It is sunny","german":"Es ist sonnig"},{"english":"It is raining","german":"Es regnet","explanation":"Impersonal weather verb: 'es regnet' = it rains/is raining; there is no separate word for 'raining'."},{"english":"It is snowing","german":"Es schneit","explanation":"Impersonal weather verb: 'es schneit' covers both 'it snows' and 'it is snowing'."},{"english":"It is windy","german":"Es ist windig"},{"english":"It is warm","german":"Es ist warm"},{"english":"It is cold","german":"Es ist kalt"},{"english":"It is hot","german":"Es ist heiß"},{"english":"It is cloudy","german":"Es ist bewölkt"},{"english":"It is foggy","german":"Es ist neblig"},{"english":"What will the weather be like tomorrow?","german":"Wie wird das Wetter morgen?"},{"english":"It will be 20 degrees","german":"Es werden 20 Grad sein","explanation":"'Es werden ... sein': 'Grad' is plural here so 'werden' is plural, and the infinitive 'sein' goes to the end."},{"english":"Take an umbrella","german":"Nimm einen Regenschirm mit","explanation":"Separable verb 'mitnehmen': the imperative 'nimm' is irregular (from 'nehmen') and the prefix 'mit' goes to the end."},{"english":"The sun is shining","german":"Die Sonne scheint"},{"english":"There is a thunderstorm","german":"Es gibt ein Gewitter","explanation":"'es gibt' = there is/are; a fixed phrase that always takes the accusative (ein Gewitter)."},{"english":"It is freezing","german":"Es friert","explanation":"Impersonal 'es friert' = it is freezing (weather); 'frieren' used with a person means 'to feel cold' — a false-friend trap."},{"english":"The weather is beautiful","german":"Das Wetter ist schön"},{"english":"The weather is bad","german":"Das Wetter ist schlecht"},{"english":"In summer it is hot","german":"Im Sommer ist es heiß","explanation":"Verb-second rule: after the fronted 'Im Sommer', the verb 'ist' precedes the subject 'es' (inversion)."},{"english":"In winter it is cold and snowy","german":"Im Winter ist es kalt und es schneit","explanation":"'und' does not cause inversion, so the second clause is plain subject-verb 'es schneit'."}]},{"id":"berufe","label":"Berufe","description":"Jobs and professions — a core telc A1 vocabulary area","exercises":[{"english":"doctor (male)","german":"der Arzt"},{"english":"doctor (female)","german":"die Ärztin","explanation":"Feminine form takes an umlaut plus -in, not just -in: Arzt → Ärztin."},{"english":"teacher (male)","german":"der Lehrer"},{"english":"teacher (female)","german":"die Lehrerin"},{"english":"engineer (male)","german":"der Ingenieur"},{"english":"engineer (female)","german":"die Ingenieurin"},{"english":"nurse (female)","german":"die Krankenschwester","explanation":"The female and male forms are different words, not an -in pair: die Krankenschwester vs. der Krankenpfleger."},{"english":"nurse (male)","german":"der Krankenpfleger"},{"english":"cook / chef","german":"der Koch"},{"english":"waiter (male)","german":"der Kellner"},{"english":"waiter (female)","german":"die Kellnerin"},{"english":"police officer (male)","german":"der Polizist","explanation":"Weak (n-declension) masculine noun: takes -en in every case except nominative singular (den/dem/des Polizisten)."},{"english":"police officer (female)","german":"die Polizistin"},{"english":"salesperson (male)","german":"der Verkäufer"},{"english":"salesperson (female)","german":"die Verkäuferin"},{"english":"student (male)","german":"der Student","explanation":"Weak (n-declension) masculine noun: takes -en in every case except nominative singular (den/dem/des Studenten)."},{"english":"student (female)","german":"die Studentin"},{"english":"What do you do for work?","german":"Was machen Sie beruflich?","explanation":"'beruflich' is an adverb here ('professionally'); the fixed question literally means 'What do you do professionally?'."},{"english":"I work as a nurse","german":"Ich arbeite als Krankenpfleger","explanation":"A profession after 'als' takes no article: 'als Krankenpfleger', never 'als ein Krankenpfleger'."},{"english":"I am unemployed","german":"Ich bin arbeitslos"}]},{"id":"verkehrsmittel","label":"Verkehrsmittel & Reisen","description":"Transport and travel — a core telc A1 Hören topic (trains, buses, tickets, schedules)","exercises":[{"english":"the train","german":"der Zug"},{"english":"the bus","german":"der Bus"},{"english":"the taxi","german":"das Taxi"},{"english":"the tram","german":"die Straßenbahn","explanation":"'Straßenbahn' is feminine (die) and keeps ß after the long 'a' in 'Straße'."},{"english":"the underground / metro","german":"die U-Bahn"},{"english":"the S-Bahn (city rail)","german":"die S-Bahn"},{"english":"the flight","german":"der Flug"},{"english":"the ship","german":"das Schiff"},{"english":"the train station","german":"der Bahnhof"},{"english":"the bus stop","german":"die Bushaltestelle"},{"english":"the ticket","german":"die Fahrkarte"},{"english":"the platform","german":"der Bahnsteig / das Gleis","explanation":"Two words: 'der Bahnsteig' (platform) but 'das Gleis' (track), so they take different articles."},{"english":"the departure","german":"die Abfahrt"},{"english":"the arrival","german":"die Ankunft"},{"english":"When does the train depart?","german":"Wann fährt der Zug ab?","explanation":"'abfahren' is separable: the prefix 'ab' moves to the end → 'fährt ... ab'."},{"english":"The train leaves at platform 3","german
