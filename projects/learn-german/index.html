":"Der Zug fährt von Gleis 3 ab","explanation":"Separable 'abfahren' splits with 'ab' at the end; use 'von Gleis 3' for departing from a track."},{"english":"One ticket to Hamburg please","german":"Eine Fahrkarte nach Hamburg bitte","explanation":"'nach' means 'to' with cities and most countries."},{"english":"I would like to take a taxi","german":"Ich möchte ein Taxi nehmen","explanation":"The modal 'möchte' is verb-second; the infinitive 'nehmen' goes to the end."},{"english":"The train is delayed","german":"Der Zug hat Verspätung","explanation":"Fixed phrase 'Verspätung haben' (literally 'to have delay'), used with no article."},{"english":"Where do I have to change?","german":"Wo muss ich umsteigen?","explanation":"'umsteigen' (to change/transfer) is separable; after the modal 'muss' the infinitive stays at the end."}]},{"id":"kommunikation","label":"Kommunikation & Nachrichten","description":"Phone calls, messages, letters, notices — telc A1 Hören/Lesen/Schreiben","exercises":[{"english":"I would like to make a phone call","german":"Ich möchte telefonieren","explanation":"German expresses 'make a phone call' with the single verb 'telefonieren' — no separate noun for 'a call' is needed."},{"english":"My phone number is ...","german":"Meine Telefonnummer ist ..."},{"english":"Can you call me back?","german":"Können Sie mich zurückrufen?","explanation":"'zurückrufen' is a separable verb, but after the modal 'können' it stays joined as one infinitive at the end; 'mich' = me (accusative)."},{"english":"I would like to leave a message","german":"Ich möchte eine Nachricht hinterlassen","explanation":"'hinterlassen' looks separable but is inseparable: the prefix 'hinter-' never splits off and the verb takes no 'ge-'."},{"english":"Please speak slowly","german":"Bitte sprechen Sie langsam"},{"english":"I did not understand","german":"Ich habe nicht verstanden","explanation":"Fixed clarification phrase; 'verstanden' is the irregular past participle of 'verstehen' (no umlaut, ends in '-en'), used here as a set survival expression."},{"english":"Can you repeat that?","german":"Können Sie das wiederholen?"},{"english":"Dear Sir / Madam (letter opening)","german":"Sehr geehrte Damen und Herren","explanation":"Fixed formal letter opening (literally 'very honoured ladies and gentlemen'), used when the recipient is unknown — learned as a set phrase."},{"english":"Kind regards (letter closing)","german":"Mit freundlichen Grüßen","explanation":"Fixed formal letter closing (literally 'with friendly greetings'); 'Grüßen' is dative plural after the preposition 'mit'."},{"english":"I am writing about my reservation","german":"Ich schreibe wegen meiner Reservierung","explanation":"'wegen' (because of) takes a following noun; in everyday A1 German it is used with the dative — here 'meiner Reservierung' (feminine dative)."},{"english":"Please send me information about ...","german":"Bitte schicken Sie mir Informationen über ...","explanation":"'mir' = (to) me, dative, because 'schicken' takes a dative indirect object; 'über' here means 'about'."},{"english":"I am arriving in August","german":"Ich komme im August an","explanation":"'ankommen' is a separable verb: the prefix 'an-' splits off and goes to the end — 'Ich komme ... an'."},{"english":"Please confirm the reservation","german":"Bitte bestätigen Sie die Reservierung"},{"english":"First name","german":"der Vorname"},{"english":"Surname / family name","german":"der Nachname / Familienname"},{"english":"Date of birth","german":"das Geburtsdatum","explanation":"Neuter ('das'), inherited from 'das Datum'; the gender is not predictable from the compound's form."},{"english":"Address","german":"die Adresse"},{"english":"Postcode","german":"die Postleitzahl","explanation":"Feminine ('die Postleitzahl'), from 'die Zahl' (number); a typical long German bureaucratic compound."},{"english":"Signature","german":"die Unterschrift"},{"english":"Payment method: cash or card?","german":"Zahlungsweise: bar oder Kreditkarte?","explanation":"'bar' means 'in cash' as an adverb (not the noun 'das Bargeld'); 'Zahlungsweise' = method of payment, a typical form-language compound."}]}];

        // ── App State ──
        const state = {
            tags: [],
            activeTags: new Set(['all']),
            deck: [],
            deckIdx: 0,
            score: { right: 0, wrong: 0 },
            revealed: false,
            scored: false,
            // F2 — streak / history
            history: { version: 1, days: [], sessions: [] },
            dayMarkedThisSession: false,
            sessionLogged: false,
            sessionStartTs: 0,
            // F3 — direction
            direction: 'en2de',
            // F7 — speech (auto-speak off by default; user opts in via the 🔊 Auto toggle)
            autoSpeak: false,
            speech: { supported: false, voice: null, voicesLoaded: false },
            // shared 5s auto-next countdown handle (cleared on any re-render)
            autoNextTimer: null,
        };

        // ── DOM refs ──
        const tagStrip   = document.getElementById('tagStrip');
        const progressRow  = document.getElementById('progressRow');
        const progressFill = document.getElementById('progressFill');
        const cardWrap   = document.getElementById('cardWrap');
        const scoreRight = document.getElementById('scoreRight');
        const scoreWrong = document.getElementById('scoreWrong');
        const dirToggle  = document.getElementById('dirToggle');
        const autoSpeakToggle = document.getElementById('autoSpeakToggle');
        const streakPill = document.getElementById('streakPill');

        // ── Utilities ──
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function normalize(s) {
            return String(s).trim().toLowerCase()
                .replace(/ü/g, 'ue').replace(/ö/g, 'oe').replace(/ä/g, 'ae')
                .replace(/ß/g, 'ss').replace(/\s+/g, ' ');
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // ── F2: streak & session history ──
        function localDayKey(d = new Date()) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`; // local, NOT toISOString() (which is UTC)
        }

        function dayKeyToDate(key) {
            const [y, m, d] = key.split('-').map(Number);
            return new Date(y, m - 1, d); // local midnight
        }

        function loadHistory() {
            const EMPTY = { version: 1, days: [], sessions: [] };
            try {
                const raw = localStorage.getItem('lg_history');
                if (!raw) return { ...EMPTY };
                const obj = JSON.parse(raw);
                if (!obj || typeof obj !== 'object') return { ...EMPTY };
                const days = Array.isArray(obj.days)
                    ? [...new Set(obj.days.filter(d => typeof d === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(d)))]
                    : [];
                const sessions = Array.isArray(obj.sessions)
                    ? obj.sessions.filter(s => s && typeof s === 'object' && typeof s.day === 'string')
                        .sort((a, b) => (a.ts || 0) - (b.ts || 0)).slice(-30)
                    : [];
                days.sort();
                return { version: 1, days, sessions };
            } catch { return { ...EMPTY }; }
        }

        function saveHistory() {
            try {
                localStorage.setItem('lg_history', JSON.stringify(state.history));
            } catch { /* private mode / quota / blocked — ignore */ }
        }

        function markDayPracticed() {
            if (state.dayMarkedThisSession) return;
            state.dayMarkedThisSession = true;
            const key = localDayKey();
            if (!state.history.days.includes(key)) {
                state.history.days.push(key);
                state.history.days.sort();
            }
            saveHistory();
            updateStreakDisplay(); // reflect today's streak in the header pill immediately
        }

        function recordSession({ right, wrong, mode = 'quiz' }) {
            if (state.sessionLogged) return;
            state.sessionLogged = true;
            const total = right + wrong;
            state.history.sessions.push({
                day: localDayKey(),
                ts: state.sessionStartTs || Date.now(),
                right, wrong, total,
                accuracy: total ? Math.round((right / total) * 100) : 0,
                mode,
            });
            if (state.history.sessions.length > 30) {
                state.history.sessions = state.history.sessions.slice(-30);
            }
            saveHistory();
        }

        function computeStreak(days) {
            const set = new Set(days);
            const today = localDayKey();
            const yesterday = localDayKey(new Date(Date.now() - 864e5));
            let cursor, atRisk = false;
            if (set.has(today)) { cursor = dayKeyToDate(today); }
            else if (set.has(yesterday)) { cursor = dayKeyToDate(yesterday); atRisk = true; }
            else { return { count: 0, atRisk: false }; }
            let count = 0;
            while (set.has(localDayKey(cursor))) {
                count++;
                cursor.setDate(cursor.getDate() - 1); // DST-safe local step
            }
            return { count, atRisk };
        }

        function getLast7Days() {
            const set = new Set(state.history.days);
            const out = [];
            const labels = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            const cur = new Date();
            cur.setHours(0, 0, 0, 0);
            for (let i = 0; i < 7; i++) {
                const key = localDayKey(cur);
                const daySessions = state.history.sessions.filter(s => s.day === key);
                const acc = daySessions.length ? Math.max(...daySessions.map(s => s.accuracy)) : 0;
                out.unshift({ key, practiced: set.has(key), accuracy: acc, isToday: i === 0,
                             label: labels[cur.getDay()] });
                cur.setDate(cur.getDate() - 1); // DST-safe local step
            }
            return out;
        }

        function renderStreakBlock() {
            let count = 0, atRisk = false, days = [];
            try {
                ({ count, atRisk } = computeStreak(state.history.days));
                days = getLast7Days();
            } catch { return ''; }
            const badge = count > 0
                ? `<div class="streak-badge${atRisk ? ' at-risk' : ''}">🔥 ${count} day streak${atRisk ? ' · practice today to keep it!' : ''}</div>`
                : `<div class="streak-badge none">Start your streak today! 🔥</div>`;
            const bars = days.map(d => {
                const h = d.practiced ? Math.max(20, d.accuracy) : 0;
                return `<div class="streak-day${d.isToday ? ' today' : ''}" title="${escapeHtml(d.key)}${d.practiced ? ' · ' + d.accuracy + '%' : ''}">
                    <div class="streak-bar-track"><div class="streak-bar-fill${d.practiced ? ' on' : ''}" style="height:${h}%"></div></div>
                    <div class="streak-day-label">${d.label}</div>
                </div>`;
            }).join('');
            return `<div class="streak-block">${badge}<div class="streak-strip">${bars}</div></div>`;
        }

        // Always-visible header streak pill (shown once the user has a live streak)
        function updateStreakDisplay() {
            if (!streakPill) return;
            let count = 0;
            try { ({ count } = computeStreak(state.history.days)); } catch { count = 0; }
            if (count > 0) {
                streakPill.textContent = `🔥 ${count}`;
                streakPill.title = `${count}-day practice streak`;
                streakPill.style.display = '';
            } else {
                streakPill.style.display = 'none';
            }
        }

        // ── Celebration (confetti + toast) ──
        function celebrate(message) {
            if (typeof document === 'undefined') return;
            const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            const toast = document.createElement('div');
            toast.className = 'celebrate-toast';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1900);

            if (reduce) return; // honor reduced-motion: toast only, no confetti

            const overlay = document.createElement('div');
            overlay.className = 'celebrate-overlay';
            const colors = ['#6366F1', '#7C3AED', '#10B981', '#F59E0B', '#EF4444', '#EC4899', '#06B6D4'];
            const pieces = 80;
            for (let i = 0; i < pieces; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = (Math.random() * 100) + 'vw';
                c.style.background = colors[i % colors.length];
                c.style.animationDuration = (1.6 + Math.random() * 1.4) + 's';
                c.style.animationDelay = (Math.random() * 0.5) + 's';
                c.style.transform = `scale(${0.7 + Math.random() * 0.8})`;
                if (i % 3 === 0) c.style.borderRadius = '50%'; // mix circles + rectangles
                overlay.appendChild(c);
            }
            document.body.appendChild(overlay);
            setTimeout(() => overlay.remove(), 3600);
        }

        // ── F3: direction (EN→DE / DE→EN) ──
        function loadDirection() {
            try {
                const v = localStorage.getItem('lg_direction');
                if (v === 'de2en' || v === 'en2de') return v;
            } catch {}
            return 'en2de';
        }

        function saveDirection(d) {
            try { localStorage.setItem('lg_direction', d); } catch {}
        }

        function isReverse() { return state.direction === 'de2en'; }

        // Whether the user is currently typing German (gates F4 article logic)
        function isGermanPrompt() { return !isReverse(); }

        function renderDirectionToggle() {
            if (!dirToggle) return;
            const de2en = isReverse();
            dirToggle.textContent = de2en ? 'DE → EN' : 'EN → DE';
            dirToggle.setAttribute('aria-pressed', String(de2en));
        }

        function setDirection(d) {
            if (d === state.direction) return;
            state.direction = d;
            saveDirection(d);
            renderDirectionToggle();
            renderCard(); // re-render current card only; deck & score untouched
        }

        // Tolerant English comparison (reverse mode): accept slash-alternatives
        // and parenthetical qualifiers, e.g. "He / she eats", "cousin (female)".
        function matchesEnglish(typed, english) {
            const n = normalize(typed);
            if (!n) return false;
            const variants = new Set();
            const add = v => { const x = normalize(v); if (x) variants.add(x); };
            add(english);
            add(english.replace(/\([^)]*\)/g, ''));
            english.split('/').forEach(part => {
                add(part);
                add(part.replace(/\([^)]*\)/g, ''));
            });
            return variants.has(n);
        }

        // ── F4: article soft-match ──
        const GERMAN_ARTICLES = new Set([
            'der', 'die', 'das',        // definite nom/acc
            'den', 'dem',               // definite acc/dat
            'ein', 'eine', 'einen', 'einem', 'einer', 'eines', // indefinite
            'des',                      // genitive
        ]);

        function stripLeadingArticle(str) {
            const trimmed = String(str).trim();
            const tokens = trimmed.split(/\s+/);
            if (tokens.length < 2) return { article: null, rest: trimmed };
            const head = tokens[0].toLowerCase();
            if (!GERMAN_ARTICLES.has(head)) return { article: null, rest: trimmed };
            const rest = tokens.slice(1).join(' ');
            // Treat as a bare noun phrase only: a single noun, or an adjective+noun
            // phrase whose final token is a capitalized German noun (e.g. "erste Stockwerk").
            // A lowercase final token signals a clause ("Mann ist groß", "Kind spielt") — reject.
            const restTokens = rest.split(/\s+/);
            const lastTok = restTokens[restTokens.length - 1];
            if (restTokens.length > 1 && !/^[A-ZÄÖÜ]/.test(lastTok)) {
                return { article: null, rest: trimmed };
            }
            return { article: tokens[0], rest };
        }

        // Returns { outcome: 'correct'|'almost'|'wrong', correctArticle?, typedArticle?, nounRest? }
        function classifyAnswer(typed, expected) {
            const variants = String(expected).split('/').map(v => v.trim()).filter(Boolean);
            if (variants.some(v => normalize(typed) === normalize(v))) {
                return { outcome: 'correct' };
            }
            const t = stripLeadingArticle(typed);
            for (const v of variants) {
                const e = stripLeadingArticle(v);
                if (!e.article) continue; // expected variant must itself be article + noun
                if (normalize(t.rest) === normalize(e.rest)) {
                    return {
                        outcome: 'almost',
                        correctArticle: e.article,
                        typedArticle: t.article,
                        nounRest: e.rest,
                    };
                }
            }
            return { outcome: 'wrong' };
        }

        // ── F7: speech / pronunciation ──
        function getGermanVoice() {
            if (!state.speech || !state.speech.supported) return null;
            if (state.speech.voice) return state.speech.voice;
            const voices = window.speechSynthesis.getVoices() || [];
            if (voices.length) state.speech.voicesLoaded = true;
            const pick = voices.find(v => v.lang === 'de-DE')
                || voices.find(v => /^de(-|_|$)/i.test(v.lang))
                || voices.find(v => /deutsch|german/i.test(v.name));
            state.speech.voice = pick || null;
            return state.speech.voice;
        }

        function initSpeech() {
            const synth = window.speechSynthesis;
            state.speech = {
                supported: !!synth && typeof SpeechSynthesisUtterance !== 'undefined',
                voice: null,
                voicesLoaded: false,
            };
            if (!state.speech.supported) return;
            getGermanVoice();
            try {
                synth.addEventListener('voiceschanged', () => {
                    state.speech.voicesLoaded = true;
                    state.speech.voice = null; // force re-resolve with the full list
                    getGermanVoice();
                });
            } catch {
                synth.onvoiceschanged = () => { state.speech.voice = null; getGermanVoice(); };
            }
        }

        function speak(text, opts) {
            if (!state.speech || !state.speech.supported) return;
            const t = String(text || '').trim();
            if (!t) return;
            const synth = window.speechSynthesis;
            try { synth.cancel(); } catch {}
            const u = new SpeechSynthesisUtterance(t);
            u.lang = 'de-DE';
            u.rate = (opts && opts.rate) || 0.9;
            const v = getGermanVoice();
            if (v) u.voice = v;
            try { synth.speak(u); } catch {}
        }

        function renderSpeakerButton() {
            if (!state.speech || !state.speech.supported) return '';
            return `<button class="speak-btn" id="speakBtn" type="button" aria-label="Play German pronunciation" title="Play pronunciation (P)">🔊</button>`;
        }

        function loadAutoSpeak() {
            try {
                const v = localStorage.getItem('lg_autospeak');
                return v === null ? false : v === '1';
            } catch { return false; }
        }

        function setAutoSpeak(on) {
            state.autoSpeak = !!on;
            try { localStorage.setItem('lg_autospeak', on ? '1' : '0'); } catch {}
            if (autoSpeakToggle) autoSpeakToggle.classList.toggle('on', state.autoSpeak);
        }

        // ── Data loading ──
        async function loadExercises() {
            try {
                const res = await fetch('./exercises.yaml', { cache: 'no-store' });
                if (res.ok) {
                    const text = await res.text();
                    const parsed = jsyaml.load(text);
                    state.tags = parsed.tags;
                    return;
                }
            } catch { /* file:// or offline — fall through */ }
            state.tags = FALLBACK_TAGS;
        }

        // ── Deck building ──
        function buildDeck() {
            let exercises;
            if (state.activeTags.has('all') || state.activeTags.size === 0) {
                exercises = state.tags.flatMap(t =>
                    t.exercises.map(ex => ({ ...ex, _tagLabel: t.label }))
                );
            } else {
                exercises = state.tags
                    .filter(t => state.activeTags.has(t.id))
                    .flatMap(t => t.exercises.map(ex => ({ ...ex, _tagLabel: t.label })));
            }
            state.deck = shuffle(exercises);
            state.deckIdx = 0;
            state.revealed = false;
            state.scored = false;
            // F2 — a fresh round is a fresh session
            state.dayMarkedThisSession = false;
            state.sessionLogged = false;
            state.sessionStartTs = Date.now();
        }

        // ── Score display ──
        function updateScoreDisplay() {
            scoreRight.textContent = `✓ ${state.score.right}`;
            scoreWrong.textContent = `✗ ${state.score.wrong}`;
        }

        // ── Tag strip ──
        function renderTagStrip() {
            const chips = [{ id: 'all', label: 'All' }]
                .concat(state.tags.map(t => ({ id: t.id, label: t.label })));

            tagStrip.innerHTML = chips.map(c => `
                <button class="tag-chip${state.activeTags.has(c.id) ? ' active' : ''}"
                        data-tag="${escapeHtml(c.id)}">
                    ${escapeHtml(c.label)}
                </button>
            `).join('');
        }

        tagStrip.addEventListener('click', e => {
            const chip = e.target.closest('.tag-chip');
            if (!chip) return;
            const id = chip.dataset.tag;

            if (id === 'all') {
                state.activeTags = new Set(['all']);
            } else {
                state.activeTags.delete('all');
                if (state.activeTags.has(id)) {
                    state.activeTags.delete(id);
                    if (state.activeTags.size === 0) state.activeTags.add('all');
                } else {
                    state.activeTags.add(id);
                }
            }

            renderTagStrip();
            buildDeck();
            renderCard();
        });

        // ── Progress ──
        function updateProgress() {
            if (state.deck.length === 0) {
                progressRow.style.display = 'none';
                return;
            }
            progressRow.style.display = 'flex';
            const done = Math.min(state.deckIdx, state.deck.length);
            const pct = (done / state.deck.length) * 100;
            progressFill.style.width = pct + '%';
        }

        // ── Main card render ──
        function renderCard() {
            // kill any pending auto-next countdown from a previous card (prevents phantom skips)
            if (state.autoNextTimer) { clearInterval(state.autoNextTimer); state.autoNextTimer = null; }

            updateProgress();

            if (state.deck.length === 0) {
                cardWrap.innerHTML = `<div class="status-msg">No exercises found for this tag.</div>`;
                return;
            }

            if (state.deckIdx >= state.deck.length) {
                renderCompletion();
                return;
            }

            const ex = state.deck[state.deckIdx];
            const reverse = isReverse();
            state.revealed = false;
            state.scored = false;

            const promptText = reverse ? ex.german : ex.english;
            const placeholder = reverse ? 'Type the English word or phrase…' : 'Type the German word or phrase…';

            cardWrap.innerHTML = `
                <div class="card" id="mainCard">
                    <div class="english-word" id="englishWord">${escapeHtml(promptText)}</div>
                    <div class="divider"></div>
                    <input
                        class="answer-input"
                        id="answerInput"
                        type="text"
                        placeholder="${placeholder}"
                        autocomplete="off"
                        autocorrect="off"
                        spellcheck="false"
                    >
                    <button class="reveal-btn" id="revealBtn">Reveal →</button>

                    <div class="answer-zone" id="answerZone">
                        <div id="answerRevealSection">
                            ${reverse ? `
                            <div class="german-answer-label">🇬🇧 English</div>
                            <div class="german-answer" id="promptAnswer">${escapeHtml(ex.english)}</div>
                            ` : ''}
                            <div class="german-answer-label"${reverse ? ' style="margin-top:14px"' : ''}>🇩🇪 German</div>
                            <div class="german-answer-row">
                                <div class="german-answer" id="germanAnswer">${escapeHtml(ex.german)}</div>
                                ${renderSpeakerButton()}
                            </div>
                            ${ex._tagLabel ? `<div class="answer-tag-label">${escapeHtml(ex._tagLabel)}</div>` : ''}
                            ${ex.explanation ? `<div class="answer-explanation">${escapeHtml(ex.explanation)}</div>` : ''}
                        </div>

                        <div id="selfScore">
                            <div class="self-score-label">Did you get it right?</div>
                            <div class="self-score-btns" style="margin-top:10px">
                                <button class="btn-yes" id="btnYes">✓ Yes, I got it</button>
                                <button class="btn-no"  id="btnNo">✗ I missed it</button>
                            </div>
                        </div>

                        <button class="next-btn" id="nextBtn" style="display:none">Next card →</button>
                    </div>
                </div>
            `;

            const answerInput = document.getElementById('answerInput');
            const revealBtn   = document.getElementById('revealBtn');
            const speakBtn    = document.getElementById('speakBtn');

            answerInput.focus();
            if (speakBtn) speakBtn.addEventListener('click', () => speak(ex.german));

            answerInput.addEventListener('keydown', e => {
                if (e.key !== 'Enter' || state.revealed) return;
                e.preventDefault();
                e.stopPropagation();
                revealBtn.click();
            });

            revealBtn.addEventListener('click', () => {
                if (state.revealed) return;
                state.revealed = true;
                revealAnswer(ex, answerInput.value.trim());
            });
        }

        function revealAnswer(ex, typed) {
            const answerZone          = document.getElementById('answerZone');
            const revealBtn           = document.getElementById('revealBtn');
            const answerInput         = document.getElementById('answerInput');
            const answerRevealSection = document.getElementById('answerRevealSection');
            const selfScore           = document.getElementById('selfScore');

            revealBtn.style.display = 'none';
            answerZone.classList.add('visible');

            // F7 — speak the German aloud on reveal (always German, both directions)
            if (state.autoSpeak) speak(ex.german);

            const reverse = isReverse();

            // shared advance for the wrong / almost paths (scores as wrong)
            const goNext = () => {
                if (state.scored) return;
                state.scored = true;
                state.score.wrong++;
                markDayPracticed();
                updateScoreDisplay();
                state.deckIdx++;
                updateProgress();
                renderCard();
            };

            if (typed) {
                // 3-way in forward (EN→DE) mode; 2-way tolerant match in reverse.
                let outcome, info = null;
                if (reverse) {
                    outcome = matchesEnglish(typed, ex.english) ? 'correct' : 'wrong';
                } else {
                    info = classifyAnswer(typed, ex.german);
                    outcome = info.outcome;
                }

                answerInput.disabled = true;

                if (outcome === 'correct') {
                    answerInput.classList.add('correct');
                    selfScore.style.display = 'none';
                    recordScore(true, true);
                } else if (outcome === 'almost') {
                    // F4 — right noun, missing/wrong article
                    answerInput.classList.add('almost');
                    const wrongArticle = info.typedArticle && info.correctArticle
                        && normalize(info.typedArticle) !== normalize(info.correctArticle);
                    answerRevealSection.insertAdjacentHTML('beforeend', `
                        <div class="almost-hint">Almost — watch the article! It's
                            <span class="article-correct">${escapeHtml(info.correctArticle)}</span>
                            ${escapeHtml(info.nounRest)}.${wrongArticle ? ` (not “${escapeHtml(info.typedArticle)}”)` : ''}
                        </div>
                    `);
                    selfScore.innerHTML = `
                        <div class="self-score-btns" style="margin-top:10px">
                            <button class="btn-yes" id="btnMarkCorrect">✓ Close enough — count it</button>
                            <button class="btn-almost-next" id="btnNextAlmost">Next word →</button>
                        </div>
                    `;
                    document.getElementById('btnMarkCorrect').addEventListener('click', () => recordScore(true, false));
                    document.getElementById('btnNextAlmost').addEventListener('click', goNext);
                } else {
                    // Wrong: reveal answer, offer override or move on
                    answerInput.classList.add('wrong');
                    selfScore.innerHTML = `
                        <div class="self-score-btns" style="margin-top:10px">
                            <button class="btn-yes" id="btnMarkCorrect">✓ Mark as correct</button>
                            <button class="btn-no" id="btnNextWrong">Next word →</button>
                        </div>
                    `;
                    document.getElementById('btnMarkCorrect').addEventListener('click', () => recordScore(true, false));
                    document.getElementById('btnNextWrong').addEventListener('click', goNext);
                }
            } else {
                // Not typed: reveal answer, show Yes/No, no auto-advance
                answerInput.style.display = 'none';
                const btnYes = document.getElementById('btnYes');
                btnYes.addEventListener('click', () => recordScore(true, false));
                document.getElementById('btnNo').addEventListener('click', () => recordScore(false, false));
                btnYes.focus(); // keyboard users can press Enter to confirm (or Tab to "missed it")
            }
        }

        function recordScore(correct, useTimer = false) {
            if (state.scored) return;
            state.scored = true;
            markDayPracticed(); // F2 — count today as practiced on first scored card

            if (correct) state.score.right++;
            else state.score.wrong++;

            updateScoreDisplay();
            updateProgress();

            // Celebrate every 10th correct answer this session
            if (correct && state.score.right > 0 && state.score.right % 10 === 0) {
                celebrate(`🎉 ${state.score.right} correct! Weiter so!`);
            }

            const selfScore = document.getElementById('selfScore');
            selfScore.innerHTML = correct
                ? `<div style="text-align:center;color:#065F46;font-weight:700;font-size:15px;">✓ Marked as correct</div>`
                : `<div style="text-align:center;color:#991B1B;font-weight:700;font-size:15px;">✗ Marked as incorrect</div>`;

            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = 'block';
            nextBtn.focus();

            if (state.autoNextTimer) { clearInterval(state.autoNextTimer); state.autoNextTimer = null; }
            if (useTimer && correct) {
                let nt = 5;
                nextBtn.textContent = `Next card → (${nt})`;
                state.autoNextTimer = setInterval(() => {
                    nt--;
                    const btn = document.getElementById('nextBtn');
                    if (!btn) { clearInterval(state.autoNextTimer); state.autoNextTimer = null; return; }
                    if (nt <= 0) {
                        clearInterval(state.autoNextTimer);
                        state.autoNextTimer = null;
                        state.deckIdx++;
                        updateProgress();
                        renderCard();
                    } else {
                        btn.textContent = `Next card → (${nt})`;
                    }
                }, 1000);
            } else {
                nextBtn.textContent = 'Next card →';
            }

            nextBtn.addEventListener('click', () => {
                if (state.autoNextTimer) { clearInterval(state.autoNextTimer); state.autoNextTimer = null; }
                state.deckIdx++;
                updateProgress();
                renderCard();
            });
        }

        // ── Completion screen ──
        function renderCompletion() {
            const total = state.deck.length;
            const { right, wrong } = state.score;
            const pct = total > 0 ? Math.round((right / total) * 100) : 0;
            const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';

            progressFill.style.width = '100%';

            let streakHtml = '';
            try {
                recordSession({ right, wrong, mode: 'quiz' });
                streakHtml = renderStreakBlock();
            } catch { /* storage hiccup — show completion without streak */ }

            cardWrap.innerHTML = `
                <div class="completion-card">
                    <div class="completion-emoji">${emoji}</div>
                    <div class="completion-title">Round complete!</div>
                    <div class="completion-sub">${pct}% correct this round</div>
                    <div class="completion-score">
                        <div class="completion-score-pill right">✓ ${right} right</div>
                        <div class="completion-score-pill wrong">✗ ${wrong} wrong</div>
                    </div>
                    ${streakHtml}
                    <div class="completion-btns">
                        <button class="btn-retry" id="btnRetry">Shuffle &amp; try again</button>
                    </div>
                </div>
            `;

            document.getElementById('btnRetry').addEventListener('click', () => {
                state.score = { right: 0, wrong: 0 };
                updateScoreDisplay();
                buildDeck();
                renderCard();
            });
        }

        // ── Global keyboard handler ──
        document.addEventListener('keydown', e => {
            if (e.repeat) return; // ignore auto-repeat from a held key

            // F7 — "P" replays the German pronunciation (never while typing the answer)
            if ((e.key === 'p' || e.key === 'P') && state.revealed
                && !(document.activeElement && document.activeElement.id === 'answerInput')) {
                const speakBtn = document.getElementById('speakBtn');
                if (speakBtn) { e.preventDefault(); speakBtn.click(); return; }
            }

            if (e.key !== 'Enter') return;

            const nextBtn = document.getElementById('nextBtn');
            if (nextBtn && nextBtn.style.display !== 'none') {
                e.preventDefault();
                nextBtn.click();
                return;
            }

            const btnNextAlmost = document.getElementById('btnNextAlmost');
            if (btnNextAlmost) {
                e.preventDefault();
                btnNextAlmost.click();
                return;
            }

            const btnNextWrong = document.getElementById('btnNextWrong');
            if (btnNextWrong) {
                e.preventDefault();
                btnNextWrong.click();
                return;
            }

            const btnRetry = document.getElementById('btnRetry');
            if (btnRetry) {
                e.preventDefault();
                btnRetry.click();
            }
        });

        // ── Boot ──
        (async () => {
            document.getElementById('statusMsg').textContent = 'Loading exercises…';

            // Persisted preferences (localStorage works on file://; only fetch is blocked)
            state.history = loadHistory();
            state.direction = loadDirection();
            state.autoSpeak = loadAutoSpeak();
            initSpeech();

            await loadExercises();
            buildDeck();
            renderTagStrip();
            renderDirectionToggle();
            updateStreakDisplay();
            if (state.speech.supported) {
                autoSpeakToggle.classList.toggle('on', state.autoSpeak);
            } else {
                autoSpeakToggle.style.display = 'none';
            }
            renderCard();

            // Toolbar wiring
            dirToggle.addEventListener('click', () => setDirection(isReverse() ? 'en2de' : 'de2en'));
            autoSpeakToggle.addEventListener('click', () => setAutoSpeak(!state.autoSpeak));
        })();
    </script>
</body>
</html>
