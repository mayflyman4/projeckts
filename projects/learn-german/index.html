<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lern Deutsch — A1 Flashcards</title>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4F46E5 0%, #7C3AED 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ── Header ── */
        .app-header {
            width: 100%;
            max-width: 720px;
            padding: 20px 20px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }

        .app-title {
            color: white;
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .app-title .flag { font-size: 1.2em; }

        .score-bar {
            display: flex;
            gap: 10px;
            font-size: 15px;
            font-weight: 700;
        }

        .score-pill {
            padding: 5px 14px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
        }

        .score-pill.right {
            background: rgba(16, 185, 129, 0.25);
            color: #6EE7B7;
            border: 1px solid rgba(16, 185, 129, 0.4);
        }

        .score-pill.wrong {
            background: rgba(239, 68, 68, 0.22);
            color: #FCA5A5;
            border: 1px solid rgba(239, 68, 68, 0.35);
        }

        /* ── Tag Filter Strip ── */
        .tag-strip-wrapper {
            width: 100%;
            max-width: 720px;
            padding: 16px 20px 0;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }
        .tag-strip-wrapper::-webkit-scrollbar { display: none; }

        .tag-strip {
            display: flex;
            gap: 8px;
            width: max-content;
        }

        .tag-chip {
            padding: 7px 16px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            border: 2px solid rgba(255, 255, 255, 0.35);
            color: rgba(255, 255, 255, 0.85);
            background: transparent;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.18s, color 0.18s, border-color 0.18s;
        }

        .tag-chip:hover {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: rgba(255, 255, 255, 0.6);
        }

        .tag-chip.active {
            background: white;
            color: #4F46E5;
            border-color: white;
        }

        /* ── Progress ── */
        .progress-row {
            width: 100%;
            max-width: 720px;
            padding: 14px 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-bar-track {
            flex: 1;
            height: 5px;
            background: rgba(255,255,255,0.25);
            border-radius: 999px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: rgba(255,255,255,0.85);
            border-radius: 999px;
            transition: width 0.4s ease;
        }

        .progress-text {
            color: rgba(255,255,255,0.75);
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
        }

        /* ── Card ── */
        .card-wrap {
            width: 100%;
            max-width: 720px;
            padding: 16px 20px 32px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 32px 28px 28px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .english-word {
            font-size: clamp(22px, 5vw, 34px);
            font-weight: 800;
            color: #1E1B4B;
            text-align: center;
            line-height: 1.25;
            min-height: 48px;
        }

        .divider {
            height: 1px;
            background: #E8E5FF;
        }

        .answer-input {
            width: 100%;
            padding: 13px 16px;
            font-size: 17px;
            border: 2px solid #C7D2FE;
            border-radius: 12px;
            color: #1E1B4B;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: inherit;
        }

        .answer-input::placeholder { color: #A5B4FC; }

        .answer-input:focus {
            border-color: #6366F1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }

        .answer-input.correct {
            border-color: #10B981;
            background: #ECFDF5;
            color: #065F46;
        }

        .answer-input.wrong {
            border-color: #EF4444;
            background: #FEF2F2;
            color: #991B1B;
        }

        .reveal-btn {
            width: 100%;
            padding: 15px;
            font-size: 17px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #6366F1 0%, #7C3AED 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .reveal-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }

        .reveal-btn:active { transform: translateY(0); }

        /* ── Answer Zone ── */
        .answer-zone {
            display: none;
            flex-direction: column;
            gap: 16px;
            animation: fadeSlideUp 0.28s ease;
        }

        .answer-zone.visible { display: flex; }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .german-answer-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: #8B5CF6;
        }

        .german-answer {
            font-size: clamp(22px, 5vw, 32px);
            font-weight: 800;
            color: #1E1B4B;
            line-height: 1.25;
        }

        .comparison-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: #F5F3FF;
            border-radius: 12px;
            padding: 12px 14px;
        }

        .comparison-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
            font-size: 14px;
        }

        .comparison-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #9CA3AF;
            min-width: 52px;
        }

        .comparison-text.match {
            color: #065F46;
            font-weight: 600;
        }

        .comparison-text.mismatch {
            color: #991B1B;
            font-weight: 600;
            text-decoration: line-through;
        }

        .match-badge {
            font-size: 12px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 999px;
        }

        .match-badge.correct { background: #D1FAE5; color: #065F46; }
        .match-badge.incorrect { background: #FEE2E2; color: #991B1B; }

        /* ── Self-score buttons ── */
        .self-score-label {
            font-size: 13px;
            font-weight: 600;
            color: #6B7280;
            text-align: center;
        }

        .self-score-btns {
            display: flex;
            gap: 10px;
        }

        .self-score-btns button {
            flex: 1;
            padding: 13px;
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .self-score-btns button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(0,0,0,0.15);
        }

        .btn-yes {
            background: #10B981;
            color: white;
        }

        .btn-no {
            background: #EF4444;
            color: white;
        }

        .next-btn {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: #4F46E5;
            background: #EEF2FF;
            border: 2px solid #C7D2FE;
            border-radius: 14px;
            cursor: pointer;
            transition: background 0.18s, transform 0.15s;
        }

        .next-btn:hover {
            background: #E0E7FF;
            transform: translateY(-1px);
        }

        /* ── Completion Card ── */
        .completion-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            padding: 40px 28px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation: fadeSlideUp 0.35s ease;
        }

        .completion-emoji { font-size: 52px; }

        .completion-title {
            font-size: 26px;
            font-weight: 800;
            color: #1E1B4B;
        }

        .completion-sub {
            font-size: 15px;
            color: #6B7280;
        }

        .completion-score {
            display: flex;
            gap: 16px;
        }

        .completion-score-pill {
            padding: 10px 22px;
            border-radius: 14px;
            font-size: 18px;
            font-weight: 800;
        }

        .completion-score-pill.right { background: #D1FAE5; color: #065F46; }
        .completion-score-pill.wrong { background: #FEE2E2; color: #991B1B; }

        .completion-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-retry {
            padding: 14px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #6366F1 0%, #7C3AED 100%);
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .btn-retry:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.4);
        }

        /* ── Loading / Error ── */
        .status-msg {
            color: rgba(255,255,255,0.8);
            text-align: center;
            padding: 40px 20px;
            font-size: 15px;
        }

        /* ── Responsive ── */
        @media (max-width: 480px) {
            .card { padding: 24px 18px 20px; }
            .self-score-btns button { font-size: 14px; padding: 12px 8px; }
        }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="app-title"><span class="flag">🇩🇪</span> Lern Deutsch</div>

    <div class="tag-strip-wrapper">

        <span class="progress-text" id="progressText">0 / 0</span>

    <div class="card-wrap" id="cardWrap">

,"german":"die Milch"},{"english":"apple","german":"der Apfel"},{"english":"banana","german":"die Banane"},{"english":"cheese","german":"der Käse"},{"english":"butter","german":"die Butter"},{"english":"eggs","german":"die Eier"},{"english":"meat","german":"das Fleisch"},{"english":"fish","german":"der Fisch"},{"english":"soup","german":"die Suppe"},{"english":"cake","german":"der Kuchen"},{"english":"juice","german":"der Saft"},{"english":"beer","german":"das Bier"},{"english":"wine","german":"der Wein"},{"english":"I like coffee","german":"Ich mag Kaffee"},{"english":"I eat bread","german":"Ich esse Brot"},{"english":"I drink water","german":"Ich trinke Wasser"}]},{"id":"wochentage","label":"Wochentage","description":"Days of the week and time expressions","exercises":[{"english":"Monday","german":"Montag"},{"english":"Tuesday","german":"Dienstag"},{"english":"Wednesday","german":"Mittwoch"},{"english":"Thursday","german":"Donnerstag"},{"english":"Friday","german":"Freitag"},{"english":"Saturday","german":"Samstag"},{"english":"Sunday","german":"Sonntag"},{"english":"today","german":"heute"},{"english":"tomorrow","german":"morgen"},{"english":"yesterday","german":"gestern"},{"english":"the day after tomorrow","german":"übermorgen"},{"english":"the day before yesterday","german":"vorgestern"},{"english":"On Monday","german":"Am Montag"},{"english":"Every Friday","german":"Jeden Freitag"},{"english":"Next Monday","german":"Nächsten Montag"},{"english":"Last Tuesday","german":"Letzten Dienstag"},{"english":"What day is today?","german":"Welcher Tag ist heute?"},{"english":"I work on Mondays","german":"Ich arbeite montags"},{"english":"On the weekend","german":"Am Wochenende"},{"english":"weekday","german":"der Werktag"}]},{"id":"monate","label":"Monate & Jahreszeiten","description":"Months and seasons","exercises":[{"english":"January","german":"Januar"},{"english":"February","german":"Februar"},{"english":"March","german":"März"},{"english":"April","german":"April"},{"english":"May","german":"Mai"},{"english":"June","german":"Juni"},{"english":"July","german":"Juli"},{"english":"August","german":"August"},{"english":"September","german":"September"},{"english":"October","german":"Oktober"},{"english":"November","german":"November"},{"english":"December","german":"Dezember"},{"english":"What month is it?","german":"Welcher Monat ist es?"},{"english":"In January","german":"Im Januar"},{"english":"My birthday is in June","german":"Mein Geburtstag ist im Juni"},{"english":"spring","german":"der Frühling"},{"english":"summer","german":"der Sommer"},{"english":"autumn","german":"der Herbst"},{"english":"winter","german":"der Winter"},{"english":"In winter it is cold","german":"Im Winter ist es kalt"}]}];

        // ── App State ──
        const state = {
            tags: [],
            activeTagId: 'all',
            deck: [],
            deckIdx: 0,
            score: { right: 0, wrong: 0 },
            revealed: false,
            scored: false,
        };

        // ── DOM refs ──
        const tagStrip   = document.getElementById('tagStrip');
        const progressRow  = document.getElementById('progressRow');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const cardWrap   = document.getElementById('cardWrap');
        const scoreRight = document.getElementById('scoreRight');
        const scoreWrong = document.getElementById('scoreWrong');

        // ── Utilities ──
        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function normalize(s) {
            return String(s).trim().toLowerCase()
                .replace(/ü/g, 'ue').replace(/ö/g, 'oe').replace(/ä/g, 'ae')
                .replace(/ß/g, 'ss').replace(/\s+/g, ' ');
        }

        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
            }[c]));
        }

        // ── Data loading ──
        async function loadExercises() {
            try {
                const res = await fetch('./exercises.yaml', { cache: 'no-store' });
                if (res.ok) {
                    const text = await res.text();
                    const parsed = jsyaml.load(text);
                    state.tags = parsed.tags;
                    return;
                }
            } catch { /* file:// or offline — fall through */ }
            state.tags = FALLBACK_TAGS;
        }

        // ── Deck building ──
        function buildDeck() {
            let exercises;
            if (state.activeTagId === 'all') {
                exercises = state.tags.flatMap(t => t.exercises);
            } else {
                const tag = state.tags.find(t => t.id === state.activeTagId);
                exercises = tag ? tag.exercises : [];
            }
            state.deck = shuffle(exercises);
            state.deckIdx = 0;
            state.revealed = false;
            state.scored = false;
        }

        // ── Score display ──
        function updateScoreDisplay() {
            scoreRight.textContent = `✓ ${state.score.right}`;
            scoreWrong.textContent = `✗ ${state.score.wrong}`;
        }

        // ── Tag strip ──
        function renderTagStrip() {
            const chips = [{ id: 'all', label: 'All' }]
                .concat(state.tags.map(t => ({ id: t.id, label: t.label })));

            tagStrip.innerHTML = chips.map(c => `
                <button class="tag-chip${c.id === state.activeTagId ? ' active' : ''}"
                        data-tag="${escapeHtml(c.id)}">
                    ${escapeHtml(c.label)}
                </button>
            `).join('');
        }

        tagStrip.addEventListener('click', e => {
            const chip = e.target.closest('.tag-chip');
            if (!chip) return;
            state.activeTagId = chip.dataset.tag;
            renderTagStrip();
            buildDeck();
            renderCard();
        });

        // ── Progress ──
        function updateProgress() {
            if (state.deck.length === 0) {
                progressRow.style.display = 'none';
                return;
            }
            progressRow.style.display = 'flex';
            const done = Math.min(state.deckIdx, state.deck.length);
            const pct = (done / state.deck.length) * 100;
            progressFill.style.width = pct + '%';
            progressText.textContent = `${done} / ${state.deck.length}`;
        }

        // ── Main card render ──
        function renderCard() {
            updateProgress();

            if (state.deck.length === 0) {
                cardWrap.innerHTML = `<div class="status-msg">No exercises found for this tag.</div>`;
                return;
            }

            if (state.deckIdx >= state.deck.length) {
                renderCompletion();
                return;
            }

            const ex = state.deck[state.deckIdx];
            state.revealed = false;
            state.scored = false;

            cardWrap.innerHTML = `
                <div class="card" id="mainCard">
                    <div class="english-word" id="englishWord">${escapeHtml(ex.english)}</div>
                    <div class="divider"></div>
                    <input
                        class="answer-input"
                        id="answerInput"
                        type="text"
                        placeholder="Type the German word or phrase…"
                        autocomplete="off"
                        autocorrect="off"
                        spellcheck="false"
                    >
                    <button class="reveal-btn" id="revealBtn">Reveal →</button>

                    <div class="answer-zone" id="answerZone">
                        <div>
                            <div class="german-answer-label">🇩🇪 German</div>
                            <div class="german-answer" id="germanAnswer">${escapeHtml(ex.german)}</div>
                        </div>

                        <div class="comparison-row" id="comparisonRow" style="display:none"></div>

                        <div id="selfScore">
                            <div class="self-score-label" id="selfScoreLabel">Did you get it right?</div>
                            <div class="self-score-btns" style="margin-top:10px">
                                <button class="btn-yes" id="btnYes">✓ Yes, I got it</button>
                                <button class="btn-no"  id="btnNo">✗ I missed it</button>
                            </div>
                        </div>

                        <button class="next-btn" id="nextBtn" style="display:none">Next card →</button>
                    </div>
                </div>
            `;

            const answerInput = document.getElementById('answerInput');
            const revealBtn   = document.getElementById('revealBtn');

            answerInput.focus();

            answerInput.addEventListener('keydown', e => {
                if (e.key === 'Enter' && !state.revealed) revealBtn.click();
            });

            revealBtn.addEventListener('click', () => {
                if (state.revealed) return;
                state.revealed = true;
                revealAnswer(ex, answerInput.value.trim());
            });
        }

        function revealAnswer(ex, typed) {
            const answerZone    = document.getElementById('answerZone');
            const comparisonRow = document.getElementById('comparisonRow');
            const selfScoreLabel = document.getElementById('selfScoreLabel');
            const revealBtn     = document.getElementById('revealBtn');
            const answerInput   = document.getElementById('answerInput');

            revealBtn.style.display = 'none';
            answerZone.classList.add('visible');

            let autoMissTimer = null;

            if (typed) {
                const isMatch = normalize(typed) === normalize(ex.german);
                answerInput.classList.add(isMatch ? 'correct' : 'wrong');
                answerInput.disabled = true;

                const badge = isMatch
                    ? '<span class="match-badge correct">Correct!</span>'
                    : '<span class="match-badge incorrect">Not quite</span>';

                comparisonRow.style.display = 'flex';
                comparisonRow.style.flexDirection = 'column';
                comparisonRow.innerHTML = `
                    <div class="comparison-item">
                        <span class="comparison-label">You</span>
                        <span class="comparison-text ${isMatch ? 'match' : 'mismatch'}">${escapeHtml(typed)}</span>
                        ${badge}
                    </div>
                    <div class="comparison-item">
                        <span class="comparison-label">Answer</span>
                        <span class="comparison-text match">${escapeHtml(ex.german)}</span>
                    </div>
                `;

                selfScoreLabel.textContent = 'Override score if needed:';

                if (!isMatch) {
                    let t = 3;
                    const btnNo = document.getElementById('btnNo');
                    btnNo.textContent = `✗ I missed it (${t})`;
                    autoMissTimer = setInterval(() => {
                        t--;
                        const btn = document.getElementById('btnNo');
                        if (!btn) { clearInterval(autoMissTimer); return; }
                        if (t <= 0) {
                            clearInterval(autoMissTimer);
                            autoMissTimer = null;
                            recordScore(false);
                        } else {
                            btn.textContent = `✗ I missed it (${t})`;
                        }
                    }, 1000);
                }
            } else {
                answerInput.style.display = 'none';
                selfScoreLabel.textContent = 'Did you get it right?';
            }

            document.getElementById('btnYes').addEventListener('click', () => {
                if (autoMissTimer) { clearInterval(autoMissTimer); autoMissTimer = null; }
                recordScore(true);
            });
            document.getElementById('btnNo').addEventListener('click', () => {
                if (autoMissTimer) { clearInterval(autoMissTimer); autoMissTimer = null; }
                recordScore(false);
            });

            document.getElementById('btnYes').focus();
        }

        function recordScore(correct) {
            if (state.scored) return;
            state.scored = true;

            if (correct) state.score.right++;
            else state.score.wrong++;

            updateScoreDisplay();
            updateProgress();

            const selfScore = document.getElementById('selfScore');
            selfScore.innerHTML = correct
                ? `<div style="text-align:center;color:#065F46;font-weight:700;font-size:15px;">✓ Marked as correct</div>`
                : `<div style="text-align:center;color:#991B1B;font-weight:700;font-size:15px;">✗ Marked as incorrect</div>`;

            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = 'block';
            nextBtn.focus();

            let nt = 3;
            nextBtn.textContent = `Next card → (${nt})`;
            const autoNextTimer = setInterval(() => {
                nt--;
                const btn = document.getElementById('nextBtn');
                if (!btn) { clearInterval(autoNextTimer); return; }
                if (nt <= 0) {
                    clearInterval(autoNextTimer);
                    state.deckIdx++;
                    updateProgress();
                    renderCard();
                } else {
                    btn.textContent = `Next card → (${nt})`;
                }
            }, 1000);

            nextBtn.addEventListener('click', () => {
                clearInterval(autoNextTimer);
                state.deckIdx++;
                updateProgress();
                renderCard();
            });
        }

        // ── Completion screen ──
        function renderCompletion() {
            const total = state.deck.length;
            const { right, wrong } = state.score;
            const pct = total > 0 ? Math.round((right / total) * 100) : 0;
            const emoji = pct >= 80 ? '🎉' : pct >= 50 ? '💪' : '📚';

            progressFill.style.width = '100%';
            progressText.textContent = `${total} / ${total}`;

            cardWrap.innerHTML = `
                <div class="completion-card">
                    <div class="completion-emoji">${emoji}</div>
                    <div class="completion-title">Round complete!</div>
                    <div class="completion-sub">${pct}% correct this round</div>
                    <div class="completion-score">
                        <div class="completion-score-pill right">✓ ${right} right</div>
                        <div class="completion-score-pill wrong">✗ ${wrong} wrong</div>
                    </div>
                    <div class="completion-btns">
                        <button class="btn-retry" id="btnRetry">Shuffle &amp; try again</button>
                    </div>
                </div>
            `;

            document.getElementById('btnRetry').addEventListener('click', () => {
                state.score = { right: 0, wrong: 0 };
                updateScoreDisplay();
                buildDeck();
                renderCard();
            });
        }

        // ── Boot ──
        (async () => {
            document.getElementById('statusMsg').textContent = 'Loading exercises…';
            await loadExercises();
            buildDeck();
            renderTagStrip();
            renderCard();
        })();
    </script>
</body>
</html>
