# German A1 Flashcard Exercises
# Each tag has at least 20 English → German exercises.
# Tags are used as filter chips in the app.
# Format: english (prompt shown to user), german (revealed answer)

tags:

  - id: begruessungen
    label: "Begrüßungen & Verabschiedungen"
    description: "Greetings and farewells"
    exercises:
      - english: "Hello"
        german: "Hallo"
      - english: "Good morning"
        german: "Guten Morgen"
      - english: "Good day / Good afternoon"
        german: "Guten Tag"
      - english: "Good evening"
        german: "Guten Abend"
      - english: "Good night"
        german: "Gute Nacht"
      - english: "Goodbye (formal)"
        german: "Auf Wiedersehen"
      - english: "Bye (informal)"
        german: "Tschüss"
      - english: "See you later"
        german: "Bis später"
      - english: "See you tomorrow"
        german: "Bis morgen"
      - english: "See you soon"
        german: "Bis bald"
      - english: "How are you? (informal)"
        german: "Wie geht es dir?"
      - english: "How are you? (formal)"
        german: "Wie geht es Ihnen?"
      - english: "I'm fine, thank you"
        german: "Mir geht es gut, danke"
      - english: "Nice to meet you"
        german: "Schön, dich kennenzulernen"
      - english: "Welcome"
        german: "Willkommen"
      - english: "Please"
        german: "Bitte"
      - english: "Thank you"
        german: "Danke"
      - english: "Thank you very much"
        german: "Danke schön"
      - english: "You're welcome"
        german: "Gern geschehen"
      - english: "Excuse me"
        german: "Entschuldigung"

