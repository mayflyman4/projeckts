  - id: personliche_info
    label: "Persönliche Informationen"
    description: "Introducing yourself — name, age, origin, job (telc A1 Sprechen/Schreiben)"
    exercises:
      - english: "What is your name? (formal)"
        german: "Wie heißen Sie?"
        explanation: "Idiom: German uses 'Wie heißen Sie?' (literally 'how are you called?'), with 'wie', not 'was'."
      - english: "What is your name? (informal)"
        german: "Wie heißt du?"
        explanation: "'heißen' is irregular: 'du heißt' takes only -t (no extra -st) because the stem ends in ß."
      - english: "My name is Anna"
        german: "Ich heiße Anna"
      - english: "Where do you come from?"
        german: "Woher kommen Sie?"
        explanation: "'woher' = from where (origin); 'wo' alone only means 'where' (location)."
      - english: "I come from India"
        german: "Ich komme aus Indien"
        explanation: "Origin uses 'aus' (+ dative); country names like Indien take no article here."
      - english: "Where do you live?"
        german: "Wo wohnen Sie?"
      - english: "I live in Berlin"
        german: "Ich wohne in Berlin"
      - english: "How old are you? (formal)"
        german: "Wie alt sind Sie?"
        explanation: "German states age with 'sein' (to be), not 'haben': 'Wie alt sind Sie?'."
      - english: "I am 30 years old"
        german: "Ich bin 30 Jahre alt"
        explanation: "Age uses 'sein' + 'Jahre alt'; literally 'I am 30 years old'."
      - english: "What is your job?"
        german: "Was machen Sie beruflich?"
        explanation: "Fixed idiom 'Was machen Sie beruflich?' (literally 'what do you do professionally?'); 'beruflich' goes to the end."
      - english: "I am a teacher"
        german: "Ich bin Lehrer"
        explanation: "No article before a profession: 'Ich bin Lehrer', not 'ein Lehrer'."
      - english: "What is your phone number?"
        german: "Was ist Ihre Telefonnummer?"
        explanation: "Formal possessive 'Ihre' is capitalized; the informal equivalent would be 'deine'."
      - english: "What is your email address?"
        german: "Was ist Ihre E-Mail-Adresse?"
      - english: "Are you married?"
        german: "Sind Sie verheiratet?"
      - english: "I am married"
        german: "Ich bin verheiratet"
      - english: "I am single"
        german: "Ich bin ledig"
        explanation: "'ledig' is the standard term for unmarried; do not use 'single' or 'allein'."
      - english: "Do you have children?"
        german: "Haben Sie Kinder?"
      - english: "I have two children"
        german: "Ich habe zwei Kinder"
      - english: "What language do you speak?"
        german: "Welche Sprache sprechen Sie?"
      - english: "I speak English and German"
        german: "Ich spreche Englisch und Deutsch"
        explanation: "Language names are nouns and capitalized: 'Englisch', 'Deutsch'."

  - id: tagesablauf
    label: "Tagesablauf"
    description: "Daily routine — a key telc A1 reading and writing topic"
    exercises:
      - english: "I get up at 7 o'clock"
        german: "Ich stehe um 7 Uhr auf"
        explanation: "Separable verb 'aufstehen': the prefix 'auf' splits off and goes to the end of the clause."
      - english: "I brush my teeth"
        german: "Ich putze mir die Zähne"
        explanation: "Uses the dative reflexive 'mir' ('to/for myself') with 'die Zähne'; literally 'I clean myself the teeth'."
      - english: "I have breakfast"
        german: "Ich frühstücke"
        explanation: "German uses the single verb 'frühstücken'; there is no 'have' construction."
      - english: "I go to work"
        german: "Ich gehe zur Arbeit"
        explanation: "'zur' = 'zu der'; 'zu' always takes the dative (here 'die Arbeit' → 'der Arbeit')."
      - english: "I start work at 8"
        german: "Ich fange um 8 Uhr an"
        explanation: "Separable verb 'anfangen': the prefix 'an' moves to the end of the clause."
      - english: "I have a lunch break"
        german: "Ich mache Mittagspause"
        explanation: "Idiomatic: German uses 'machen' (not 'haben') and drops the article: 'Mittagspause machen'."
      - english: "I eat lunch"
        german: "Ich esse zu Mittag"
        explanation: "Fixed phrase 'zu Mittag essen' (no article); 'zu' here means 'for' the meal."
      - english: "I finish work at 5"
        german: "Ich höre um 17 Uhr auf"
        explanation: "Separable verb 'aufhören' (to stop); '17 Uhr' is the normal 24-hour way to say 5 pm."
      - english: "I go home"
        german: "Ich gehe nach Hause"
        explanation: "Fixed phrase 'nach Hause' (motion); note 'nach Hause' = going home, but 'zu Hause' = being at home."
      - english: "I cook dinner"
        german: "Ich koche Abendessen"
      - english: "I eat dinner"
        german: "Ich esse zu Abend"
        explanation: "Fixed phrase 'zu Abend essen' (no article), parallel to 'zu Mittag essen'."
      - english: "I watch TV"
        german: "Ich schaue fern"
        explanation: "Separable verb 'fernschauen': 'fern' goes to the end; the more standard variant is 'Ich sehe fern' (fernsehen)."
      - english: "I read a book"
        german: "Ich lese ein Buch"
      - english: "I go to bed"
        german: "Ich gehe schlafen"
        explanation: "German says 'schlafen gehen' (literally 'go to sleep'); the bare infinitive 'schlafen' goes to the end."
      - english: "I take a shower"
        german: "Ich dusche"
      - english: "I drink coffee in the morning"
        german: "Ich trinke morgens Kaffee"
        explanation: "'morgens' (with -s) is an adverb meaning 'in the mornings / every morning', distinct from the noun 'der Morgen'."
      - english: "I take the bus to work"
        german: "Ich fahre mit dem Bus zur Arbeit"
        explanation: "German says 'mit dem Bus fahren' (travel by bus); 'mit' always takes the dative."
      - english: "I sleep 8 hours"
        german: "Ich schlafe 8 Stunden"
      - english: "On weekends I go for a walk"
        german: "Am Wochenende gehe ich spazieren"
        explanation: "Fronting the time phrase forces verb-second word order, so the verb precedes the subject ('gehe ich'); 'spazieren gehen' puts the infinitive at the end."
      - english: "I go shopping on Saturday"
        german: "Ich gehe am Samstag einkaufen"
        explanation: "Separable verb 'einkaufen'; as an infinitive after 'gehen' the whole 'einkaufen' stands at the end of the clause."

  - id: einkaufen
    label: "Einkaufen"
    description: "Shopping — prices, quantities, asking for items (telc A1 Lesen/Schreiben)"
    exercises:
      - english: "How much does it cost?"
        german: "Was kostet das?"
      - english: "It costs 5 euros"
        german: "Es kostet 5 Euro"
        explanation: "'Euro' stays singular after a number (5 Euro, not 'Euros') — currency units are uninflected here."
      - english: "I would like to buy this"
        german: "Ich möchte das kaufen"
      - english: "That is too expensive"
        german: "Das ist zu teuer"
      - english: "I will take it"
        german: "Ich nehme es"
        explanation: "German uses the present tense 'nehme' for this near-future intent — no separate future form needed."
      - english: "How can I help you?"
        german: "Wie kann ich Ihnen helfen?"
        explanation: "'helfen' takes the dative, so formal 'you' is 'Ihnen', not 'Sie'."
      - english: "I am just looking"
        german: "Ich schaue nur"
        explanation: "'Ich schaue nur' is the fixed shop phrase for 'just browsing' — 'nur' (only) carries the 'just'."
      - english: "Do you accept cards?"
        german: "Akzeptieren Sie Karten?"
      - english: "Where is the checkout?"
        german: "Wo ist die Kasse?"
        explanation: "'die Kasse' (feminine) is the checkout/till — the pay point, not 'cash'."
      - english: "A kilo of apples please"
        german: "Ein Kilo Äpfel bitte"
        explanation: "No 'von'/'of' — German says bare 'Kilo Äpfel'; the plural of Apfel takes an umlaut: Äpfel."
      - english: "A bottle of water please"
        german: "Eine Flasche Wasser bitte"
      - english: "I would like to pay"
        german: "Ich möchte bezahlen"
      - english: "The receipt please"
        german: "Die Quittung bitte"
      - english: "Here is the change"
        german: "Hier ist das Wechselgeld"
        explanation: "'das Wechselgeld' (neuter) means the money given back — learn the compound as one word."
      - english: "Do you have this in a different size?"
        german: "Haben Sie das in einer anderen Größe?"
        explanation: "'in' takes the dative here, giving 'einer anderen Größe' (feminine dative, adjective ending -en)."
      - english: "Is the shop open?"
        german: "Ist das Geschäft geöffnet?"
      - english: "The shop is closed on Sundays"
        german: "Das Geschäft ist sonntags geschlossen"
        explanation: "Lowercase 'sonntags' means 'on Sundays (habitually)', distinct from capitalised 'Sonntag' (the day itself)."
      - english: "I need milk and bread"
        german: "Ich brauche Milch und Brot"
      - english: "A half kilo of cheese"
        german: "Ein halbes Kilo Käse"
        explanation: "'Kilo' is neuter, so 'half' is 'halbes'; and no 'von'/'of' before 'Käse'."
      - english: "That costs 3 euros 50"
        german: "Das kostet 3 Euro 50"
        explanation: "German states prices as '3 Euro 50' — no word for 'cents' and no 'und' between the parts."

  - id: richtungen
    label: "Richtungen & Orte"
    description: "Asking for and giving directions (telc A1 Hören/Lesen)"
    exercises:
      - english: "Excuse me, where is the train station?"
        german: "Entschuldigung, wo ist der Bahnhof?"
      - english: "Go straight ahead"
        german: "Gehen Sie geradeaus"
        explanation: "'geradeaus' is one word (spelling trap) and means 'straight ahead'."
      - english: "Turn left"
        german: "Biegen Sie links ab"
        explanation: "Separable verb 'abbiegen': the prefix 'ab' splits off to the end (Biegen Sie ... ab)."
      - english: "Turn right"
        german: "Biegen Sie rechts ab"
        explanation: "Separable verb 'abbiegen': the prefix 'ab' goes to the end of the clause (Biegen Sie ... ab)."
      - english: "The bank is on the left"
        german: "Die Bank ist links"
      - english: "The pharmacy is on the right"
        german: "Die Apotheke ist rechts"
      - english: "It is near here"
        german: "Es ist hier in der Nähe"
        explanation: "'in der Nähe' is a fixed dative phrase meaning 'nearby/in the vicinity'."
      - english: "It is far away"
        german: "Es ist weit weg"
      - english: "How far is it?"
        german: "Wie weit ist es?"
      - english: "About 500 metres"
        german: "Ungefähr 500 Meter"
        explanation: "After a number, 'Meter' stays singular (no plural -s) — 'fünfhundert Meter'."
      - english: "At the traffic lights"
        german: "An der Ampel"
        explanation: "die Ampel (feminine); 'an' takes the dative for location, so 'die' → 'der'."
      - english: "At the crossroads"
        german: "An der Kreuzung"
        explanation: "die Kreuzung (feminine); 'an' + dative for location, so 'die' → 'der'."
      - english: "Next to the church"
        german: "Neben der Kirche"
        explanation: "'neben' takes the dative for location (no movement); feminine 'die Kirche' → 'der Kirche'."
      - english: "Opposite the school"
        german: "Gegenüber der Schule"
        explanation: "'gegenüber' takes the dative: feminine 'die Schule' → 'der Schule'."
      - english: "Where is the bus stop?"
        german: "Wo ist die Bushaltestelle?"
      - english: "Is there a post office nearby?"
        german: "Gibt es hier in der Nähe eine Post?"
        explanation: "die Post (feminine) = post office; 'es gibt' takes the accusative — feminine 'eine' is unchanged."
      - english: "I am looking for the supermarket"
        german: "Ich suche den Supermarkt"
        explanation: "'suchen' takes a direct (accusative) object: masculine 'der Supermarkt' → 'den Supermarkt'."
      - english: "Please speak slowly"
        german: "Bitte sprechen Sie langsam"
      - english: "I don't understand"
        german: "Ich verstehe nicht"
      - english: "Can you repeat that please?"
        german: "Können Sie das bitte wiederholen?"

  - id: uhrzeit
    label: "Uhrzeit"
    description: "Telling the time — a core telc A1 topic"
    exercises:
      - english: "What time is it?"
        german: "Wie spät ist es?"
        explanation: "Idiom: literally 'how late is it?' — German uses 'spät' (late), there is no word for 'time' here."
      - english: "It is 8 o'clock"
        german: "Es ist 8 Uhr"
      - english: "It is half past 3"
        german: "Es ist halb vier"
        explanation: "Trap: 'halb vier' literally means 'half (to) four' = 3:30, so German names the NEXT hour, not the current one."
      - english: "It is quarter past 5"
        german: "Es ist Viertel nach fünf"
        explanation: "'Viertel' is capitalized because it functions as a noun (a quarter); 'nach' = past."
      - english: "It is quarter to 7"
        german: "Es ist Viertel vor sieben"
        explanation: "'vor' = to/before the hour: 'Viertel vor sieben' = 6:45."
      - english: "At what time does the train leave?"
        german: "Um wie viel Uhr fährt der Zug ab?"
        explanation: "Separable verb 'abfahren': the prefix 'ab' goes to the very end of the clause (...fährt der Zug ab)."
      - english: "The train leaves at 9:15"
        german: "Der Zug fährt um 9:15 Uhr ab"
        explanation: "Separable verb 'abfahren': the prefix 'ab' is sent to the end (Der Zug fährt um 9:15 Uhr ab)."
      - english: "The shop opens at 9"
        german: "Das Geschäft öffnet um 9 Uhr"
      - english: "The shop closes at 8 pm"
        german: "Das Geschäft schließt um 20 Uhr"
      - english: "In the morning"
        german: "Am Morgen"
      - english: "In the afternoon"
        german: "Am Nachmittag"
      - english: "In the evening"
        german: "Am Abend"
      - english: "At noon"
        german: "Am Mittag"
        explanation: "'am' = 'an dem'; time-of-day points take 'an' + dative, parallel to Am Morgen / Am Abend."
      - english: "At midnight"
        german: "Um Mitternacht"
        explanation: "Fixed phrase: 'um Mitternacht' uses 'um' with no article, unlike Am Morgen / Am Mittag."
      - english: "The film starts at 8 pm"
        german: "Der Film beginnt um 20 Uhr"
      - english: "How long does it take?"
        german: "Wie lange dauert es?"
      - english: "It takes one hour"
        german: "Es dauert eine Stunde"
      - english: "I have an appointment at 3"
        german: "Ich habe um 3 Uhr einen Termin"
        explanation: "Time before object: 'um 3 Uhr' comes before 'einen Termin' (time expressions precede other elements)."
      - english: "It is 10 past 6"
        german: "Es ist 10 nach sechs"
        explanation: "'nach' = past the hour; the hour name is not capitalized (sechs)."
      - english: "It is 20 to 9"
        german: "Es ist 20 vor neun"
        explanation: "'vor' = to/before the hour: '20 vor neun' = 8:40."

  - id: gesundheit
    label: "Gesundheit"
    description: "Health and illness vocabulary (telc A1 Sprechen/Hören)"
    exercises:
      - english: "I have a headache"
        german: "Ich habe Kopfschmerzen"
        explanation: "'Kopf' (head) + plural '-schmerzen' (pains): German names aches as a compound with plural Schmerzen."
      - english: "I have a stomach ache"
        german: "Ich habe Bauchschmerzen"
        explanation: "'Bauch' (belly) + '-schmerzen', like Kopfschmerzen; the body part compounds with plural Schmerzen."
      - english: "I am sick"
        german: "Ich bin krank"
      - english: "I feel unwell"
        german: "Mir ist nicht gut"
        explanation: "Dative idiom, literally 'to-me is not good': uses 'mir' (dative), no 'ich' subject."
      - english: "I have a cold"
        german: "Ich habe eine Erkältung"
        explanation: "'die Erkältung' (feminine) = a cold/illness — not the adjective 'kalt' (cold temperature)."
      - english: "I have a fever"
        german: "Ich habe Fieber"
        explanation: "'Fieber' takes no article here: 'Fieber haben' (to have a fever) is used without ein."
      - english: "I need a doctor"
        german: "Ich brauche einen Arzt"
        explanation: "'ein' → 'einen': Arzt is masculine and the accusative object of brauchen."
      - english: "Where is the pharmacy?"
        german: "Wo ist die Apotheke?"
        explanation: "'die Apotheke' = pharmacy for medicine; a 'Drogerie' only sells toiletries/non-prescription goods."
      - english: "I am allergic to penicillin"
        german: "Ich bin allergisch gegen Penicillin"
        explanation: "Fixed preposition: 'allergisch gegen' (literally 'against'), not 'zu', for allergic to."
      - english: "How often should I take this?"
        german: "Wie oft soll ich das nehmen?"
        explanation: "Modal 'soll' goes second and the infinitive 'nehmen' goes to the end."
      - english: "Three times a day"
        german: "Dreimal täglich"
        explanation: "'dreimal' = three times, written as one word (Zahl + -mal); 'täglich' = daily."
      - english: "I have a toothache"
        german: "Ich habe Zahnschmerzen"
      - english: "My arm hurts"
        german: "Mein Arm tut weh"
        explanation: "'wehtun' is separable: the prefix 'weh' moves to the end — 'tut ... weh'."
      - english: "I cannot sleep"
        german: "Ich kann nicht schlafen"
        explanation: "Modal 'kann' is second and the infinitive 'schlafen' goes to the end."
      - english: "I feel better today"
        german: "Ich fühle mich heute besser"
        explanation: "'sich fühlen' is reflexive, so 'mich' is required: 'Ich fühle mich ...'."
      - english: "I need to see a doctor"
        german: "Ich muss zum Arzt gehen"
        explanation: "'zum' = zu dem (dative): 'zum Arzt gehen' is the fixed way to say 'go to the doctor'."
      - english: "Please call an ambulance"
        german: "Rufen Sie bitte einen Krankenwagen"
        explanation: "Polite imperative: verb 'Rufen' first, then 'Sie'; 'einen Krankenwagen' is masculine accusative."
      - english: "I need a prescription"
        german: "Ich brauche ein Rezept"
        explanation: "'das Rezept' (neuter) means both 'prescription' and 'recipe'; here 'ein Rezept'."
      - english: "the hospital"
        german: "das Krankenhaus"
      - english: "the doctor's surgery"
        german: "die Arztpraxis"
        explanation: "'die Arztpraxis' (feminine) = doctor's office/practice, from 'Praxis'."

  - id: wohnen
    label: "Wohnen"
    description: "Rooms, housing, and accommodation (telc A1 Lesen/Schreiben)"
    exercises:
      - english: "the bedroom"
        german: "das Schlafzimmer"
      - english: "the kitchen"
        german: "die Küche"
      - english: "the bathroom"
        german: "das Badezimmer"
      - english: "the living room"
        german: "das Wohnzimmer"
      - english: "the dining room"
        german: "das Esszimmer"
      - english: "the toilet"
        german: "die Toilette"
      - english: "the garden"
        german: "der Garten"
      - english: "the balcony"
        german: "der Balkon"
      - english: "the entrance hall"
        german: "der Flur"
        explanation: "'der Flur' (hallway/corridor) is masculine and its gender is not predictable from the meaning."
      - english: "the apartment"
        german: "die Wohnung"
      - english: "the ground floor"
        german: "das Erdgeschoss"
      - english: "the first floor"
        german: "das erste Stockwerk"
        explanation: "False friend: 'erstes Stockwerk' / 'erster Stock' is the floor ABOVE ground level (US second floor); ground level is 'das Erdgeschoss'."
      - english: "the rent"
        german: "die Miete"
      - english: "the landlord"
        german: "der Vermieter"
      - english: "I live in a flat"
        german: "Ich wohne in einer Wohnung"
        explanation: "'wohnen in' takes the dative for location, so feminine 'die Wohnung' becomes 'in einer Wohnung'."
      - english: "The apartment has 3 rooms"
        german: "Die Wohnung hat 3 Zimmer"
      - english: "The rent is 800 euros"
        german: "Die Miete beträgt 800 Euro"
        explanation: "'betragen' (to amount to) is irregular: a→ä, so 'sie beträgt'. 'Euro' stays singular after a number."
      - english: "I am looking for a flat"
        german: "Ich suche eine Wohnung"
      - english: "Is heating included?"
        german: "Ist die Heizung inklusive?"
      - english: "The flat is on the second floor"
        german: "Die Wohnung ist im zweiten Stockwerk"
        explanation: "'im' = 'in dem': dative for static location; note 'zweites Stockwerk' counts from above the ground floor (Erdgeschoss)."

  - id: hobbys
    label: "Freizeit & Hobbys"
    description: "Leisure and hobbies — telc A1 Sprechen topic"
    exercises:
      - english: "What do you do in your free time?"
        german: "Was machen Sie in Ihrer Freizeit?"
        explanation: "'in' takes the dative here: 'in Ihrer Freizeit'; 'die Freizeit' is feminine."
      - english: "I like reading"
        german: "Ich lese gern"
        explanation: "'gern' after the verb expresses liking an activity; 'lesen' is irregular (du liest, er liest)."
      - english: "I like cooking"
        german: "Ich koche gern"
      - english: "I play football"
        german: "Ich spiele Fußball"
      - english: "I go swimming"
        german: "Ich gehe schwimmen"
        explanation: "Two verbs: conjugated 'gehe' in second position, infinitive 'schwimmen' at the end."
      - english: "I watch films"
        german: "Ich schaue Filme"
      - english: "I listen to music"
        german: "Ich höre Musik"
      - english: "I go for walks"
        german: "Ich gehe spazieren"
        explanation: "Fixed phrase 'spazieren gehen'; the infinitive 'spazieren' goes to the end."
      - english: "I travel"
        german: "Ich reise"
      - english: "I paint"
        german: "Ich male"
      - english: "I play guitar"
        german: "Ich spiele Gitarre"
        explanation: "No article before instruments: 'Gitarre spielen', not 'die Gitarre'."
      - english: "I do sport"
        german: "Ich mache Sport"
        explanation: "German uses the collocation 'Sport machen', not 'tun' or 'spielen'."
      - english: "I go to the gym"
        german: "Ich gehe ins Fitnessstudio"
        explanation: "'ins' = 'in das': accusative for movement/direction; 'das Fitnessstudio'."
      - english: "I meet friends"
        german: "Ich treffe Freunde"
        explanation: "'treffen' is irregular (du triffst, er trifft), though 'ich treffe' is regular."
      - english: "I play computer games"
        german: "Ich spiele Computerspiele"
      - english: "I dance"
        german: "Ich tanze"
      - english: "I take photos"
        german: "Ich mache Fotos"
        explanation: "Collocation 'Fotos machen' — German 'makes' photos rather than 'takes' them."
      - english: "I go cycling"
        german: "Ich fahre Fahrrad"
        explanation: "Collocation 'Fahrrad fahren'; 'fahren' is irregular (du fährst, er fährt)."
      - english: "What are your hobbies?"
        german: "Was sind Ihre Hobbys?"
        explanation: "Plural of 'das Hobby' is 'Hobbys' (English-style -s, not -en)."
      - english: "I like hiking"
        german: "Ich wandere gern"
        explanation: "Stem 'wander-' ends in -er, so the ich-ending is just -e: 'ich wandere'."

  - id: wetter
    label: "Wetter"
    description: "Weather expressions (telc A1 Lesen/Hören)"
    exercises:
      - english: "What is the weather like?"
        german: "Wie ist das Wetter?"
      - english: "It is sunny"
        german: "Es ist sonnig"
      - english: "It is raining"
        german: "Es regnet"
        explanation: "Impersonal weather verb: 'es regnet' = it rains/is raining; there is no separate word for 'raining'."
      - english: "It is snowing"
        german: "Es schneit"
        explanation: "Impersonal weather verb: 'es schneit' covers both 'it snows' and 'it is snowing'."
      - english: "It is windy"
        german: "Es ist windig"
      - english: "It is warm"
        german: "Es ist warm"
      - english: "It is cold"
        german: "Es ist kalt"
      - english: "It is hot"
        german: "Es ist heiß"
      - english: "It is cloudy"
        german: "Es ist bewölkt"
      - english: "It is foggy"
        german: "Es ist neblig"
      - english: "What will the weather be like tomorrow?"
        german: "Wie wird das Wetter morgen?"
      - english: "It will be 20 degrees"
        german: "Es werden 20 Grad sein"
        explanation: "'Es werden ... sein': 'Grad' is plural here so 'werden' is plural, and the infinitive 'sein' goes to the end."
      - english: "Take an umbrella"
        german: "Nimm einen Regenschirm mit"
        explanation: "Separable verb 'mitnehmen': the imperative 'nimm' is irregular (from 'nehmen') and the prefix 'mit' goes to the end."
      - english: "The sun is shining"
        german: "Die Sonne scheint"
      - english: "There is a thunderstorm"
        german: "Es gibt ein Gewitter"
        explanation: "'es gibt' = there is/are; a fixed phrase that always takes the accusative (ein Gewitter)."
      - english: "It is freezing"
        german: "Es friert"
        explanation: "Impersonal 'es friert' = it is freezing (weather); 'frieren' used with a person means 'to feel cold' — a false-friend trap."
      - english: "The weather is beautiful"
        german: "Das Wetter ist schön"
      - english: "The weather is bad"
        german: "Das Wetter ist schlecht"
      - english: "In summer it is hot"
        german: "Im Sommer ist es heiß"
        explanation: "Verb-second rule: after the fronted 'Im Sommer', the verb 'ist' precedes the subject 'es' (inversion)."
      - english: "In winter it is cold and snowy"
        german: "Im Winter ist es kalt und es schneit"
        explanation: "'und' does not cause inversion, so the second clause is plain subject-verb 'es schneit'."

  - id: berufe
    label: "Berufe"
    description: "Jobs and professions — a core telc A1 vocabulary area"
    exercises:
      - english: "doctor (male)"
        german: "der Arzt"
      - english: "doctor (female)"
        german: "die Ärztin"
        explanation: "Feminine form takes an umlaut plus -in, not just -in: Arzt → Ärztin."
      - english: "teacher (male)"
        german: "der Lehrer"
      - english: "teacher (female)"
        german: "die Lehrerin"
      - english: "engineer (male)"
        german: "der Ingenieur"
      - english: "engineer (female)"
        german: "die Ingenieurin"
      - english: "nurse (female)"
        german: "die Krankenschwester"
        explanation: "The female and male forms are different words, not an -in pair: die Krankenschwester vs. der Krankenpfleger."
      - english: "nurse (male)"
        german: "der Krankenpfleger"
      - english: "cook / chef"
        german: "der Koch"
      - english: "waiter (male)"
        german: "der Kellner"
      - english: "waiter (female)"
        german: "die Kellnerin"
      - english: "police officer (male)"
        german: "der Polizist"
        explanation: "Weak (n-declension) masculine noun: takes -en in every case except nominative singular (den/dem/des Polizisten)."
      - english: "police officer (female)"
        german: "die Polizistin"
      - english: "salesperson (male)"
        german: "der Verkäufer"
      - english: "salesperson (female)"
        german: "die Verkäuferin"
      - english: "student (male)"
        german: "der Student"
        explanation: "Weak (n-declension) masculine noun: takes -en in every case except nominative singular (den/dem/des Studenten)."
      - english: "student (female)"
        german: "die Studentin"
      - english: "What do you do for work?"
        german: "Was machen Sie beruflich?"
        explanation: "'beruflich' is an adverb here ('professionally'); the fixed question literally means 'What do you do professionally?'."
      - english: "I work as a nurse"
        german: "Ich arbeite als Krankenpfleger"
        explanation: "A profession after 'als' takes no article: 'als Krankenpfleger', never 'als ein Krankenpfleger'."
      - english: "I am unemployed"
        german: "Ich bin arbeitslos"

  - id: verkehrsmittel
    label: "Verkehrsmittel & Reisen"
    description: "Transport and travel — a core telc A1 Hören topic (trains, buses, tickets, schedules)"
    exercises:
      - english: "the train"
        german: "der Zug"
      - english: "the bus"
        german: "der Bus"
      - english: "the taxi"
        german: "das Taxi"
      - english: "the tram"
        german: "die Straßenbahn"
        explanation: "'Straßenbahn' is feminine (die) and keeps ß after the long 'a' in 'Straße'."
      - english: "the underground / metro"
        german: "die U-Bahn"
      - english: "the S-Bahn (city rail)"
        german: "die S-Bahn"
      - english: "the flight"
        german: "der Flug"
      - english: "the ship"
        german: "das Schiff"
      - english: "the train station"
        german: "der Bahnhof"
      - english: "the bus stop"
        german: "die Bushaltestelle"
      - english: "the ticket"
        german: "die Fahrkarte"
      - english: "the platform"
        german: "der Bahnsteig / das Gleis"
        explanation: "Two words: 'der Bahnsteig' (platform) but 'das Gleis' (track), so they take different articles."
      - english: "the departure"
        german: "die Abfahrt"
      - english: "the arrival"
        german: "die Ankunft"
      - english: "When does the train depart?"
        german: "Wann fährt der Zug ab?"
        explanation: "'abfahren' is separable: the prefix 'ab' moves to the end → 'fährt ... ab'."
      - english: "The train leaves at platform 3"
        german: "Der Zug fährt von Gleis 3 ab"
        explanation: "Separable 'abfahren' splits with 'ab' at the end; use 'von Gleis 3' for departing from a track."
      - english: "One ticket to Hamburg please"
        german: "Eine Fahrkarte nach Hamburg bitte"
        explanation: "'nach' means 'to' with cities and most countries."
      - english: "I would like to take a taxi"
        german: "Ich möchte ein Taxi nehmen"
        explanation: "The modal 'möchte' is verb-second; the infinitive 'nehmen' goes to the end."
      - english: "The train is delayed"
        german: "Der Zug hat Verspätung"
        explanation: "Fixed phrase 'Verspätung haben' (literally 'to have delay'), used with no article."
      - english: "Where do I have to change?"
        german: "Wo muss ich umsteigen?"
        explanation: "'umsteigen' (to change/transfer) is separable; after the modal 'muss' the infinitive stays at the end."

  - id: kommunikation
    label: "Kommunikation & Nachrichten"
    description: "Phone calls, messages, letters, notices — telc A1 Hören/Lesen/Schreiben"
    exercises:
      - english: "I would like to make a phone call"
        german: "Ich möchte telefonieren"
        explanation: "German expresses 'make a phone call' with the single verb 'telefonieren' — no separate noun for 'a call' is needed."
      - english: "My phone number is ..."
        german: "Meine Telefonnummer ist ..."
      - english: "Can you call me back?"
        german: "Können Sie mich zurückrufen?"
        explanation: "'zurückrufen' is a separable verb, but after the modal 'können' it stays joined as one infinitive at the end; 'mich' = me (accusative)."
      - english: "I would like to leave a message"
        german: "Ich möchte eine Nachricht hinterlassen"
        explanation: "'hinterlassen' looks separable but is inseparable: the prefix 'hinter-' never splits off and the verb takes no 'ge-'."
      - english: "Please speak slowly"
        german: "Bitte sprechen Sie langsam"
      - english: "I did not understand"
        german: "Ich habe nicht verstanden"
        explanation: "Fixed clarification phrase; 'verstanden' is the irregular past participle of 'verstehen' (no umlaut, ends in '-en'), used here as a set survival expression."
      - english: "Can you repeat that?"
        german: "Können Sie das wiederholen?"
      - english: "Dear Sir / Madam (letter opening)"
        german: "Sehr geehrte Damen und Herren"
        explanation: "Fixed formal letter opening (literally 'very honoured ladies and gentlemen'), used when the recipient is unknown — learned as a set phrase."
      - english: "Kind regards (letter closing)"
        german: "Mit freundlichen Grüßen"
        explanation: "Fixed formal letter closing (literally 'with friendly greetings'); 'Grüßen' is dative plural after the preposition 'mit'."
      - english: "I am writing about my reservation"
        german: "Ich schreibe wegen meiner Reservierung"
        explanation: "'wegen' (because of) takes a following noun; in everyday A1 German it is used with the dative — here 'meiner Reservierung' (feminine dative)."
      - english: "Please send me information about ..."
        german: "Bitte schicken Sie mir Informationen über ..."
        explanation: "'mir' = (to) me, dative, because 'schicken' takes a dative indirect object; 'über' here means 'about'."
      - english: "I am arriving in August"
        german: "Ich komme im August an"
        explanation: "'ankommen' is a separable verb: the prefix 'an-' splits off and goes to the end — 'Ich komme ... an'."
      - english: "Please confirm the reservation"
        german: "Bitte bestätigen Sie die Reservierung"
      - english: "First name"
        german: "der Vorname"
      - english: "Surname / family name"
        german: "der Nachname / Familienname"
      - english: "Date of birth"
        german: "das Geburtsdatum"
        explanation: "Neuter ('das'), inherited from 'das Datum'; the gender is not predictable from the compound's form."
      - english: "Address"
        german: "die Adresse"
      - english: "Postcode"
        german: "die Postleitzahl"
        explanation: "Feminine ('die Postleitzahl'), from 'die Zahl' (number); a typical long German bureaucratic compound."
      - english: "Signature"
        german: "die Unterschrift"
      - english: "Payment method: cash or card?"
        german: "Zahlungsweise: bar oder Kreditkarte?"
        explanation: "'bar' means 'in cash' as an adverb (not the noun 'das Bargeld'); 'Zahlungsweise' = method of payment, a typical form-language compound."
