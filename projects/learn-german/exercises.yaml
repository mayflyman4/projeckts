  - id: wochentage
    label: "Wochentage"
    description: "Days of the week and time expressions"
    exercises:
      - english: "Monday"
        german: "Montag"
      - english: "Tuesday"
        german: "Dienstag"
      - english: "Wednesday"
        german: "Mittwoch"
      - english: "Thursday"
        german: "Donnerstag"
      - english: "Friday"
        german: "Freitag"
      - english: "Saturday"
        german: "Samstag"
      - english: "Sunday"
        german: "Sonntag"
      - english: "today"
        german: "heute"
      - english: "tomorrow"
        german: "morgen"
        explanation: "False-friend trap: lowercase 'morgen' = tomorrow, but capitalized 'der Morgen' = (the) morning."
      - english: "yesterday"
        german: "gestern"
      - english: "the day after tomorrow"
        german: "übermorgen"
      - english: "the day before yesterday"
        german: "vorgestern"
      - english: "On Monday"
        german: "Am Montag"
        explanation: "'am' = 'an dem'; days of the week take 'an' + dative, contracted to 'am'."
      - english: "Every Friday"
        german: "Jeden Freitag"
        explanation: "'jeden' is masculine accusative of 'jeder'; recurring time points use the bare accusative (no preposition)."
      - english: "Next Monday"
        german: "Nächsten Montag"
        explanation: "'nächsten' takes the masculine accusative ending; future time points stand in the bare accusative without a preposition."
      - english: "Last Tuesday"
        german: "Letzten Dienstag"
        explanation: "'letzten' is masculine accusative; past time points use the bare accusative (no preposition)."
      - english: "What day is today?"
        german: "Welcher Tag ist heute?"
        explanation: "'Welcher' is masculine nominative agreeing with der Tag, the subject of the sentence."
      - english: "I work on Mondays"
        german: "Ich arbeite montags"
        explanation: "'montags' (lowercase, with -s) means 'on Mondays / habitually'; this time adverb is lowercase even though the day name Montag is capitalized."
      - english: "On the weekend"
        german: "Am Wochenende"
        explanation: "Fixed expression 'am Wochenende' (an dem Wochenende); das Wochenende is neuter."
      - english: "weekday"
        german: "der Werktag"
        explanation: "'der Werktag' means a working day (Mon–Fri); do not confuse with 'der Wochentag' = any day of the week."

