        german: "zwanzig"
      - english: "thirty"
        german: "dreißig"
        explanation: "Spelled '-ßig' (dreißig), not '-zig' like the other tens (zwanzig, vierzig) — a common spelling trap."
      - english: "one hundred"
        german: "hundert"
        explanation: "German omits 'ein' here: just 'hundert' (or 'einhundert'), unlike English 'one/a hundred'."
      - english: "one thousand"
        german: "tausend"
