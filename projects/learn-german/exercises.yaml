      - english: "Her sister is a doctor"
        german: "Ihre Schwester ist Ärztin"
        explanation: "No article before professions: 'ist Ärztin', not 'ist eine Ärztin'; feminine adds -in and umlauts: 'Arzt' → 'Ärztin'."

