      - english: "I work"
        german: "Ich arbeite"
        explanation: "'arbeiten' inserts an extra -e- before consonant endings for pronounceability: du arbeitest, er/sie arbeitet."
      - english: "You learn"
        german: "Du lernst"
      - english: "He / she speaks"
        german: "Er / sie spricht"
        explanation: "'sprechen' is a strong verb with an e→i stem change: du sprichst, er/sie spricht."
      - english: "We live"
        german: "Wir wohnen"
      - english: "They play"
        german: "Sie spielen"
      - english: "I read"
        german: "Ich lese"
        explanation: "'lesen' has an e→ie stem change in 2nd/3rd person singular: du liest, er/sie liest."
      - english: "You write"
        german: "Du schreibst"
      - english: "He / she runs"
        german: "Er / sie läuft"
        explanation: "'laufen' takes an umlaut (au→äu) in 2nd/3rd person singular: du läufst, er/sie läuft."
      - english: "We swim"
        german: "Wir schwimmen"
      - english: "They cook"
        german: "Sie kochen"
      - english: "I drive"
        german: "Ich fahre"
        explanation: "'fahren' takes an umlaut (a→ä) in 2nd/3rd person singular: du fährst, er/sie fährt."
      - english: "You help"
        german: "Du hilfst"
        explanation: "'helfen' has an e→i stem change in 2nd/3rd person singular: du hilfst, er/sie hilft."
      - english: "He / she sings"
        german: "Er / sie singt"
      - english: "We travel"
        german: "Wir reisen"
      - english: "They buy"
