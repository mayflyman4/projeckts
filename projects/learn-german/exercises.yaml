# German A1 Flashcard Exercises
# Each tag has at least 20 English → German exercises.
# Tags are used as filter chips in the app.
# Format: english (prompt shown to user), german (revealed answer), explanation (optional grammar note)

tags:

  - id: begruessungen
    label: "Begrüßungen & Verabschiedungen"
    description: "Greetings and farewells"
    exercises:
      - english: "Hello"
        german: "Hallo"
      - english: "Good morning"
        german: "Guten Morgen"
        explanation: "'Guten' takes the accusative -n ending (fixed greeting, short for 'Ich wünsche Ihnen einen guten Morgen'); same pattern for Guten Tag/Guten Abend."
      - english: "Good day / Good afternoon"
        german: "Guten Tag"
      - english: "Good evening"
        german: "Guten Abend"
      - english: "Good night"
        german: "Gute Nacht"
        explanation: "'Gute' (no -n) because 'Nacht' is feminine — contrast with masculine 'Guten Morgen/Tag/Abend'."
      - english: "Goodbye (formal)"
        german: "Auf Wiedersehen"
      - english: "Bye (informal)"
        german: "Tschüss"
      - english: "See you later"
        german: "Bis später"
      - english: "See you tomorrow"
        german: "Bis morgen"
        explanation: "'morgen' (lowercase) = tomorrow; 'der Morgen' (capitalized) = the morning — same spelling, different meaning."
      - english: "See you soon"
        german: "Bis bald"
      - english: "How are you? (informal)"
        german: "Wie geht es dir?"
        explanation: "Literally 'how goes it to you'; 'dir' is the dative of 'du'."
      - english: "How are you? (formal)"
        german: "Wie geht es Ihnen?"
        explanation: "'Ihnen' is the formal dative 'you' and is always capitalized."
      - english: "I'm fine, thank you"
        german: "Mir geht es gut, danke"
        explanation: "Literally 'to me it goes well'; the dative 'Mir' is fronted, so the verb 'geht' stays in second position."
      - english: "Nice to meet you"
        german: "Schön, dich kennenzulernen"
        explanation: "'kennenzulernen' is the zu-infinitive of the separable verb 'kennenlernen' — 'zu' is inserted between the prefix (kennen) and the stem (lernen)."
      - english: "Welcome"
        german: "Willkommen"
      - english: "Please"
        german: "Bitte"
      - english: "Thank you"
        german: "Danke"
      - english: "Thank you very much"
        german: "Danke schön"
      - english: "You're welcome"
        german: "Gern geschehen"
        explanation: "Fixed idiom (literally 'gladly happened'); not translated word-for-word."
      - english: "Excuse me"
        german: "Entschuldigung"

  - id: modal_verb
    label: "Modal Verbs"
    description: "können, müssen, dürfen, wollen, sollen, mögen, möchten"
    exercises:
      - english: "I can swim"
        german: "Ich kann schwimmen"
        explanation: "'können' = can/able to. Expresses ability. The infinitive (schwimmen) goes to the end."
      - english: "I must work"
        german: "Ich muss arbeiten"
        explanation: "'müssen' = must/have to. Expresses necessity or obligation. Infinitive goes to the end."
      - english: "You can drive"
        german: "Du kannst fahren"
        explanation: "'können' conjugation: ich kann, du kannst, er kann. Expresses ability."
      - english: "She must cook"
        german: "Sie muss kochen"
        explanation: "'müssen' conjugation: ich muss, du musst, sie muss. Expresses necessity."
      - english: "We want to go"
        german: "Wir wollen gehen"
        explanation: "'wollen' = to want to. Expresses desire or intention. Infinitive at the end."
      - english: "You may leave"
        german: "Du darfst gehen"
        explanation: "'dürfen' = may/to be allowed to. Expresses permission. Infinitive at the end."
      - english: "I would like a coffee"
        german: "Ich möchte einen Kaffee"
        explanation: "'möchten' = would like. Polite form of mögen. Note 'einen Kaffee' — masculine accusative."
      - english: "He should come"
        german: "Er soll kommen"
        explanation: "'sollen' = should/supposed to. Used when someone else expects this of you."
      - english: "Can you help me?"
        german: "Kannst du mir helfen?"
        explanation: "Questions with modals: verb comes first (Kannst), then subject (du). 'mir' = me (dative)."
      - english: "I must learn German"
        german: "Ich muss Deutsch lernen"
        explanation: "'müssen' = necessity. The infinitive (lernen) always goes to the end of the clause."
      - english: "We can speak German"
        german: "Wir können Deutsch sprechen"
        explanation: "'können' = ability. Infinitive (sprechen) at the end. Used for language skills."
      - english: "She wants to buy shoes"
        german: "Sie will Schuhe kaufen"
        explanation: "'wollen': 3rd person is 'will' (not 'wollen'). Infinitive (kaufen) at the end."
      - english: "May I sit here?"
        german: "Darf ich hier sitzen?"
        explanation: "'dürfen' in a question: verb first (Darf), then subject (ich). Asking permission politely."
      - english: "You should eat"
        german: "Du sollst essen"
        explanation: "'sollen' = supposed to/should. Used when someone else has told you to do something."
      - english: "I like music"
        german: "Ich mag Musik"
        explanation: "'mögen' = to like. When used directly with a noun (no infinitive), it means you like something."
      - english: "He can run fast"
        german: "Er kann schnell laufen"
        explanation: "'können' = ability. Adverbs (schnell) go before the infinitive (laufen) at the end."
      - english: "We must go home"
        german: "Wir müssen nach Hause gehen"
        explanation: "'müssen' = necessity. The full phrase 'nach Hause gehen' (go home) goes to the end."
      - english: "She would like some water"
        german: "Sie möchte Wasser"
        explanation: "'möchten' = would like. No infinitive needed when directly requesting a noun."
      - english: "Can he come?"
        german: "Kann er kommen?"
        explanation: "Modal in a question: verb first (Kann), then subject (er), then infinitive (kommen)."
      - english: "I want to sleep"
        german: "Ich will schlafen"
        explanation: "'wollen' = to want to. Expresses a strong personal desire. Infinitive at the end."
      - english: "I would like to pay"
        german: "Ich möchte zahlen"
        explanation: "'möchten' = would like to. Classic polite phrase in restaurants and shops."
      - english: "Can you please speak slowly?"
        german: "Können Sie bitte langsam sprechen?"
        explanation: "'können' with 'Sie' (formal). Polite request: modal verb first, infinitive last."
      - english: "May I help you?"
        german: "Darf ich Ihnen helfen?"
        explanation: "'dürfen' = permission/offer. 'Ihnen' is the formal dative 'you' — polite register."
      - english: "I must go to the doctor"
        german: "Ich muss zum Arzt gehen"
        explanation: "'müssen' = necessity. 'zum Arzt' = to the doctor. Full infinitive phrase at the end."
      - english: "Do I have to change trains?"
        german: "Muss ich umsteigen?"
        explanation: "'müssen' = have to. 'umsteigen' (change trains) is a separable verb used as infinitive."
      - english: "Where can I buy a ticket?"
        german: "Wo kann ich eine Fahrkarte kaufen?"
        explanation: "'Wo kann ich...?' = Where can I...? Modal stays in 2nd position; infinitive goes last."
      - english: "I would like a single room"
        german: "Ich möchte ein Einzelzimmer"
        explanation: "'möchten' = would like. Hotel request with no infinitive — directly followed by the noun."
      - english: "You must not smoke here"
        german: "Hier darf man nicht rauchen"
        explanation: "'müssen nicht' = don't have to; 'dürfen nicht' = must not/forbidden. English 'must not' is a prohibition, so German uses 'darf nicht'. 'man' = one/people."
      - english: "He can speak English"
        german: "Er kann Englisch sprechen"
        explanation: "'können' = ability. Commonly used for language skills. Infinitive at the end."
      - english: "I would like to reserve a table"
        german: "Ich möchte einen Tisch reservieren"
        explanation: "'möchten' + infinitive at the end. 'einen Tisch' = masculine accusative direct object."
      - english: "Can you help me please?"
        german: "Können Sie mir bitte helfen?"
        explanation: "'können' formal polite request (Sie form). 'mir' = me (dative, because helfen takes dative)."
      - english: "She must take the medicine"
        german: "Sie muss die Medizin nehmen"
        explanation: "'müssen' = obligation. Often used for doctor's instructions. Infinitive at the end."
      - english: "We want to visit Berlin"
        german: "Wir wollen Berlin besuchen"
        explanation: "'wollen' = intention/plan. Expresses a group desire. Infinitive (besuchen) at the end."
      - english: "You should drink more water"
        german: "Sie sollen mehr Wasser trinken"
        explanation: "'sollen' = should (advice from someone else, e.g. a doctor). Infinitive at the end."
      - english: "I would like to make an appointment"
        german: "Ich möchte einen Termin machen"
        explanation: "'möchten' + infinitive. Standard polite phrase for scheduling. 'Termin' = appointment."
      - english: "Can I pay by card?"
        german: "Kann ich mit Karte zahlen?"
        explanation: "'können' for possibility. 'mit Karte' = by card (mit takes dative). Common payment phrase."
      - english: "I would like to order"
        german: "Ich möchte bestellen"
        explanation: "'möchten' + infinitive. Standard phrase when ready to order in a restaurant."
      - english: "Can you repeat that?"
        german: "Können Sie das wiederholen?"
        explanation: "'können' formal request (Sie form). 'das wiederholen' = repeat that. Infinitive at the end."

  - id: nominativ
    label: "Nominativ"
    description: "Nominative case — subject of the sentence"
    exercises:
      - english: "The man is tall"
        german: "Der Mann ist groß"
        explanation: "'Der' = masculine nominative article. Mann is the subject (the one being described)."
      - english: "The woman is beautiful"
        german: "Die Frau ist schön"
        explanation: "'Die' = feminine nominative article. Frau is the subject."
      - english: "The child plays"
        german: "Das Kind spielt"
        explanation: "'Das' = neuter nominative article. Kind is the subject doing the action."
      - english: "The dog is small"
        german: "Der Hund ist klein"
        explanation: "'Der' = masculine nominative. Hund is the subject being described."
      - english: "A cat is sleeping"
        german: "Eine Katze schläft"
        explanation: "'Eine' = feminine indefinite nominative. Note 'schläft': schlafen is irregular (a→ä in er/sie/es)."
      - english: "The house is big"
        german: "Das Haus ist groß"
        explanation: "'Das' = neuter nominative. Haus is the subject being described."
      - english: "A man is coming"
        german: "Ein Mann kommt"
        explanation: "'Ein' = masculine indefinite nominative. Mann is the subject doing the action."
      - english: "The teacher is kind"
        german: "Der Lehrer ist nett"
        explanation: "'Der' = masculine nominative. Lehrer is the subject being described."
      - english: "A student learns"
        german: "Ein Student lernt"
        explanation: "'Ein' = masculine indefinite nominative. Student is the subject doing the action."
      - english: "The coffee is hot"
        german: "Der Kaffee ist heiß"
        explanation: "'Der' = masculine nominative. Kaffee is the subject."
      - english: "The car is red"
        german: "Das Auto ist rot"
        explanation: "'Das' = neuter nominative. Auto is the subject being described."
      - english: "A child is playing"
        german: "Ein Kind spielt"
        explanation: "'Ein' = neuter indefinite nominative (not 'eine' — Kind is neuter). Kind is the subject."
      - english: "The school is closed"
        german: "Die Schule ist geschlossen"
        explanation: "'Die' = feminine nominative. Schule is the subject."
      - english: "The phone rings"
        german: "Das Telefon klingelt"
        explanation: "'Das' = neuter nominative. Telefon is the subject doing the action."
      - english: "A woman is singing"
        german: "Eine Frau singt"
        explanation: "'Eine' = feminine indefinite nominative. Frau is the subject."
      - english: "The window is open"
        german: "Das Fenster ist offen"
        explanation: "'Das' = neuter nominative. Fenster is the subject."
      - english: "The door is closed"
        german: "Die Tür ist geschlossen"
        explanation: "'Die' = feminine nominative. Tür has an unpredictable feminine gender and an umlaut to memorize."
      - english: "A friend comes"
        german: "Ein Freund kommt"
        explanation: "'Ein' = masculine indefinite nominative. Freund is the subject doing the action."
      - english: "The bus is late"
        german: "Der Bus ist spät"
        explanation: "'Der' = masculine nominative. Bus is the subject."
      - english: "The book is interesting"
        german: "Das Buch ist interessant"
        explanation: "'Das' = neuter nominative. Buch is the subject being described."

  - id: akkusativ
    label: "Akkusativ"
    description: "Accusative case — direct object of the sentence"
    exercises:
      - english: "I see the man"
        german: "Ich sehe den Mann"
        explanation: "'der' → 'den': masculine definite article changes in accusative. Mann is the direct object."
      - english: "She loves the dog"
        german: "Sie liebt den Hund"
        explanation: "'der' → 'den': masculine definite accusative. Hund is the direct object (receiving the love)."
      - english: "He buys a book"
        german: "Er kauft ein Buch"
        explanation: "'ein' stays 'ein': neuter indefinite article is unchanged in accusative. Buch is the direct object."
      - english: "I have a cat"
        german: "Ich habe eine Katze"
        explanation: "'eine' stays 'eine': feminine indefinite is unchanged in accusative. Katze is the direct object."
      - english: "We need a car"
        german: "Wir brauchen ein Auto"
        explanation: "'ein' stays 'ein': neuter indefinite is unchanged in accusative. Auto is the direct object."
      - english: "She drinks the water"
        german: "Sie trinkt das Wasser"
        explanation: "'das' stays 'das': neuter definite is unchanged in accusative. Wasser is the direct object."
      - english: "He reads the book"
        german: "Er liest das Buch"
        explanation: "'das' stays 'das': neuter definite is unchanged in accusative. Buch is the direct object."
      - english: "We eat the bread"
        german: "Wir essen das Brot"
        explanation: "'das' stays 'das': neuter definite is unchanged in accusative. Brot is the direct object."
      - english: "She opens the door"
        german: "Sie öffnet die Tür"
        explanation: "'die' stays 'die': feminine definite is unchanged in accusative. Tür is the direct object."
      - english: "He hears the music"
        german: "Er hört die Musik"
        explanation: "'die' stays 'die': feminine definite is unchanged in accusative. Musik is the direct object."
      - english: "I love the city"
        german: "Ich liebe die Stadt"
        explanation: "'die' stays 'die': feminine definite is unchanged in accusative. Stadt is the direct object."
      - english: "She has a brother"
        german: "Sie hat einen Bruder"
        explanation: "'ein' → 'einen': masculine indefinite changes in accusative. Bruder is the direct object."
      - english: "We need a house"
        german: "Wir brauchen ein Haus"
        explanation: "'ein' stays 'ein': neuter indefinite is unchanged in accusative. Haus is the direct object."
      - english: "He drinks a coffee"
        german: "Er trinkt einen Kaffee"
        explanation: "'ein' → 'einen': masculine indefinite changes in accusative. Kaffee is the direct object."
      - english: "I buy the apple"
        german: "Ich kaufe den Apfel"
        explanation: "'der' → 'den': masculine definite changes in accusative. Apfel is the direct object."
      - english: "We close the window"
        german: "Wir schließen das Fenster"
        explanation: "'das' stays 'das': neuter definite is unchanged in accusative. Fenster is the direct object."
      - english: "He sees the school"
        german: "Er sieht die Schule"
        explanation: "'die' stays 'die': feminine definite is unchanged in accusative. Schule is the direct object."
      - english: "I find the bag"
        german: "Ich finde die Tasche"
        explanation: "'die' stays 'die': feminine definite is unchanged in accusative. Tasche is the direct object."
      - english: "She visits a friend"
        german: "Sie besucht eine Freundin"
        explanation: "'eine' stays 'eine': feminine indefinite is unchanged in accusative. Freundin is the direct object."
      - english: "He calls the doctor"
        german: "Er ruft den Arzt an"
        explanation: "'anrufen' is a separable verb: the prefix 'an' moves to the end (ruft ... an). 'der' → 'den': masculine definite accusative direct object."

  - id: dativ
    label: "Dativ"
    description: "Dative case — indirect object and certain prepositions"
    exercises:
      - english: "I give the man a book"
        german: "Ich gebe dem Mann ein Buch"
        explanation: "'der' -> 'dem': masculine dative. 'dem Mann' is the indirect object (to whom you give)."
      - english: "She helps the woman"
        german: "Sie hilft der Frau"
        explanation: "'helfen' always takes a dative object, not accusative: 'die' -> 'der' (feminine dative)."
      - english: "He writes to the child"
        german: "Er schreibt dem Kind"
        explanation: "'das' -> 'dem': neuter dative. 'dem Kind' is the indirect object (to whom he writes)."
      - english: "I go to the doctor"
        german: "Ich gehe zum Arzt"
        explanation: "'zum' = 'zu dem': the preposition 'zu' always takes dative (masculine: dem)."
      - english: "She comes from the school"
        german: "Sie kommt von der Schule"
        explanation: "'von' always takes dative: 'die' -> 'der' (feminine dative)."
      - english: "He lives in the house"
        german: "Er wohnt in dem Haus"
        explanation: "Two-way preposition 'in' takes dative for static location (where? — no movement): 'das' -> 'dem'. Usually contracted to 'im Haus'."
      - english: "I talk to a friend"
        german: "Ich spreche mit einem Freund"
        explanation: "'mit' always takes dative: 'ein' -> 'einem' (masculine indefinite dative)."
      - english: "She is at home"
        german: "Sie ist zu Hause"
        explanation: "'zu Hause' is a fixed dative expression meaning 'at home' — learned as a set phrase."
      - english: "He goes to work"
        german: "Er geht zur Arbeit"
        explanation: "'zur' = 'zu der': preposition 'zu' always takes dative (feminine: der)."
      - english: "I travel by train"
        german: "Ich reise mit dem Zug"
        explanation: "'mit' expresses means of transport and always takes dative: 'der' -> 'dem' (masculine)."
      - english: "She sits on the chair"
        german: "Sie sitzt auf dem Stuhl"
        explanation: "Two-way preposition 'auf' takes dative for static location (sitting still = where?): 'der' -> 'dem'."
      - english: "He stands at the door"
        german: "Er steht an der Tür"
        explanation: "Two-way preposition 'an' takes dative for static location (standing = where?): 'die' -> 'der' (feminine)."
      - english: "I give a gift to my mother"
        german: "Ich gebe meiner Mutter ein Geschenk"
        explanation: "Possessive in feminine dative: 'meine' -> 'meiner'. Mutter is the indirect object (to whom)."
      - english: "She speaks with the teacher"
        german: "Sie spricht mit dem Lehrer"
        explanation: "'mit' always takes dative: 'der' -> 'dem' (masculine definite dative)."
      - english: "He lives near the church"
        german: "Er wohnt bei der Kirche"
        explanation: "'bei' always takes dative: 'die' -> 'der' (feminine definite dative)."
      - english: "I meet with a friend"
        german: "Ich treffe mich mit einem Freund"
        explanation: "Reflexive 'sich treffen' plus 'mit' + dative: 'ein' -> 'einem' (masculine indefinite dative)."
      - english: "She goes to the supermarket"
        german: "Sie geht zum Supermarkt"
        explanation: "'zum' = 'zu dem': preposition 'zu' always takes dative (masculine: dem)."
      - english: "He comes from Germany"
        german: "Er kommt aus Deutschland"
        explanation: "'aus' always takes dative — used for origin and countries; no article with most country names."
      - english: "I am at the station"
        german: "Ich bin am Bahnhof"
        explanation: "'am' = 'an dem': 'an' takes dative for static location (being at a place). Masculine dative."
      - english: "She gives the child the ball"
        german: "Sie gibt dem Kind den Ball"
        explanation: "'dem Kind' = dative (indirect object: to whom); 'den Ball' = accusative (direct object: what)."

  - id: nomen
    label: "Nomen"
    description: "Basic nouns with their articles"
    exercises:
      - english: "the house"
        german: "das Haus"
      - english: "the car"
        german: "das Auto"
        explanation: "'Auto' is neuter (das), not masculine — a common trap since learners expect 'der' for vehicles."
      - english: "the dog"
        german: "der Hund"
      - english: "the cat"
        german: "die Katze"
      - english: "the book"
        german: "das Buch"
      - english: "the table"
        german: "der Tisch"
      - english: "the chair"
        german: "der Stuhl"
      - english: "the water"
        german: "das Wasser"
      - english: "the bread"
        german: "das Brot"
      - english: "the milk"
        german: "die Milch"
        explanation: "'Milch' is feminine (die) — gender is unpredictable and must be memorised."
      - english: "the apple"
        german: "der Apfel"
        explanation: "'Apfel' is masculine (der) and takes an umlaut in the plural: die Äpfel."
      - english: "the city"
        german: "die Stadt"
        explanation: "'Stadt' is feminine (die) and has an umlaut plural: die Städte."
      - english: "the street"
        german: "die Straße"
        explanation: "'Straße' is written with ß after the long vowel; never 'Strasse' in standard German."
      - english: "the school"
        german: "die Schule"
      - english: "the door"
        german: "die Tür"
        explanation: "'Tür' is feminine (die) — the gender of this short word is unpredictable and must be learned."
      - english: "the window"
        german: "das Fenster"
        explanation: "'Fenster' is neuter (das); the -er ending often looks masculine but here it is not."
      - english: "the phone"
        german: "das Telefon"
        explanation: "'Telefon' is neuter (das); the gender is not guessable from the word."
      - english: "the bag"
        german: "die Tasche"
      - english: "the key"
        german: "der Schlüssel"
        explanation: "'Schlüssel' is masculine (der); most nouns ending in -el are masculine (der Löffel, der Mantel)."
      - english: "the time"
        german: "die Zeit"
        explanation: "'Zeit' is feminine (die) — like many abstract nouns its gender must be memorised."

  - id: artikel
    label: "Artikel"
    description: "der / die / das — German definite articles"
    exercises:
      - english: "the man"
        german: "der Mann"
      - english: "the woman"
        german: "die Frau"
      - english: "the child"
        german: "das Kind"
        explanation: "'das Kind': neuter, even though it refers to a person — gender here is grammatical, not natural."
      - english: "the tree"
        german: "der Baum"
        explanation: "'der Baum': masculine and takes an umlaut in the plural 'Bäume'."
      - english: "the flower"
        german: "die Blume"
      - english: "the house"
        german: "das Haus"
      - english: "the book"
        german: "das Buch"
        explanation: "'das Buch': neuter — learners often wrongly expect 'der'."
      - english: "the cat"
        german: "die Katze"
        explanation: "'die Katze': feminine as a noun regardless of the animal's actual sex."
      - english: "the dog"
        german: "der Hund"
      - english: "the car"
        german: "das Auto"
        explanation: "'das Auto': neuter loanword; learners often wrongly guess 'der'."
      - english: "the school"
        german: "die Schule"
      - english: "the table"
        german: "der Tisch"
      - english: "the door"
        german: "die Tür"
        explanation: "'die Tür': feminine and umlauted; frequently mis-gendered."
      - english: "the window"
        german: "das Fenster"
        explanation: "'das Fenster': neuter, even though the -er ending often signals masculine (e.g. der Computer)."
      - english: "the city"
        german: "die Stadt"
        explanation: "'die Stadt': feminine; note the umlauted plural 'Städte'."
      - english: "the country"
        german: "das Land"
        explanation: "'das Land': neuter; the umlauted plural is 'Länder'."
      - english: "the apple"
        german: "der Apfel"
        explanation: "'der Apfel': masculine and takes an umlaut in the plural 'Äpfel'."
      - english: "the bottle"
        german: "die Flasche"
      - english: "the key"
        german: "der Schlüssel"
        explanation: "'der Schlüssel': masculine; the gender of -el nouns is not predictable and must be memorized."
      - english: "the letter"
        german: "der Brief"
        explanation: "'der Brief': masculine; means a postal letter (not 'letter' as in alphabet, which is 'der Buchstabe')."

  - id: verben
